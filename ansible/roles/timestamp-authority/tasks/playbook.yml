---
 - name: timestamp-authority playbook
   hosts: all
   become: true
   vars_files:
     - ../vars/default.yml
     - ../vars/{{ ansible_os_family }}.yml

   pre_tasks:
     - name: Get instance metadata
       ec2_metadata_facts:

     - name: Set facts from ssm here since they require ec2 metadata to lookup region
       set_fact:
         account_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/account/name', region=ansible_ec2_instance_identity_document_region ) }}"
         artifacts_bucket_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/artifacts/bucket/name', region=ansible_ec2_instance_identity_document_region ) }}"
         company_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/company/name', region=ansible_ec2_instance_identity_document_region ) }}"
         hosted_zone_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/dns/hosted_zone/name', region=ansible_ec2_instance_identity_document_region ) }}"
         platform_env: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/name', region=ansible_ec2_instance_identity_document_region ) }}"
         tsa_config_timestamp_signer: "{{ lookup('amazon.aws.aws_ssm', tsa_kms_signer_param, region=ansible_ec2_instance_identity_document_region ) }}"
         trust_materials_bucket_name: "{{ lookup('amazon.aws.aws_ssm', tsa_trust_materials_bucket_param, region=ansible_ec2_instance_identity_document_region ) }}"

     - name: Set facts from environment variables
       set_fact:
         service_name: "{{ ansible_env.SERVICENAME | default('unknown') }}"
         service_component: "{{ ansible_env.SERVICECOMPONENT | default(ansible_env.SERVICENAME | default('unknown')) }}"
         project: "{{ ansible_env.PROJECT | default('unknown') }}"
         namespace: "{{ ansible_env.NAMESPACE | default('unknown') }}"

     - name: Set base application directory
       set_fact:
         tsa_app_dir: "/opt/tsa/server"

     - name: Print all environment vars for debugging
       debug:
         var: hostvars[inventory_hostname]
         verbosity: 2

     - name: Ensure required variables are defined
       fail:
         msg: "{{ item }} must be defined use -e {{ item }}=value"
       when: (lookup('vars', item, default=None)) is none
       with_items:
         - account_name
         - artifacts_bucket_name
         - company_name
         - hosted_zone_name
         - platform_env
         - tsa_config_timestamp_signer
         - service_name
         - service_component
         - project
         - namespace

   tasks:
     - name: Create tsa user
       user:
         name: "{{ tsa_server_system_user }}"
         password: '*'
         umask: 0027
         shell: /usr/sbin/nologin
         system: true

     - name: Create tsa directories
       file:
         path: "{{ tsa_app_dir }}/{{ item }}"
         owner: "root"
         group: "{{ tsa_server_system_user}}"
         mode: 0750
         state: directory
       loop:
         - bin
         - certs

     - name: Set architecture format based on normalized naming
       set_fact:
         architecture_normalized_name: >-
           {%- if ansible_architecture == "aarch64" -%}
           arm64
           {%- else -%}
           amd64
           {%- endif -%}

     - name: Check current binary hash
       stat:
         path: "{{ tsa_app_dir }}/bin/tsa-server"
         checksum_algorithm: sha256
         get_checksum: yes
       register: current_binary
       ignore_errors: yes

     - name: Deploy tsa binary
       when: current_binary.stat.checksum | default('') != tsa_binary_sha256
       block:
         - name: Set binary staging directory path
           set_fact:
             staging_dir: "{{ tsa_app_dir }}/bin/.staging"

         - name: Create binary staging directory
           file:
             path: "{{ staging_dir }}"
             state: directory
             mode: "0700"

         - name: Get pinned tsa release from s3 artifacts bucket 
           amazon.aws.s3_object:
            bucket: "{{ artifacts_bucket_name }}"
            object: "thirdparty/sigstore/timestamp-authority/v{{ tsa_version }}/timestamp-server-linux-{{ architecture_normalized_name }}"
            dest: "{{ staging_dir }}/tsa-server"
            mode: get
            overwrite: always

         - name: Compute sha256 of downloaded binary
           stat:
             path: "{{ staging_dir }}/tsa-server"
             checksum_algorithm: sha256
             get_checksum: yes
           register: staged_binary

         - name: Verify sha256 matches release index
           fail:
             msg: >-
               SHA256 mismatch: expected {{ tsa_binary_sha256 }},
               got {{ staged_binary.stat.checksum }}
           when: staged_binary.stat.checksum != tsa_binary_sha256

         - name: Ensure binary has correct permissions
           file:
             path: "{{ staging_dir }}/tsa-server"
             mode: "0755"
             owner: root
             group: root

         - name: Move verified binary into place
           command: mv "{{ staging_dir }}/tsa-server" "{{ tsa_app_dir }}/bin/tsa-server"
           notify: restart tsa service

         - name: Clean staging directory
           file:
             path: "{{ staging_dir }}"
             state: absent

     - name: Copy tsa certificate chain from s3 trust-materials bucket
       amazon.aws.s3_object:
         bucket: "{{ trust_materials_bucket_name }}"
         object: "{{ tsa_trust_materials_cert_chain_path }}"
         dest: "{{ tsa_app_dir }}/certs/tsa-chain.pem"
         mode: get
         overwrite: different
       notify: restart tsa service

     - name: Ensure certificate chain has correct permissions
       file:
         path: "{{ tsa_app_dir }}/certs/tsa-chain.pem"
         mode: "0644"
         owner: root
         group: "{{ tsa_server_system_user }}"  

     - name: Ensure /etc/tsa directory exists
       file:
         path: /etc/tsa
         state: directory
         owner: root
         group: root
         mode: "0755"

     - name: Build tsa env content
       set_fact:
         tsa_env_content: |
           TSA_HTTP_ADDRESS={{ tsa_server_address }}
           TSA_HTTP_PORT={{ tsa_server_port }}
           TSA_HTTP_SCHEME={{ tsa_server_scheme }}
           TSA_KMS_KEY_SIGNER={{ tsa_config_timestamp_signer }}
           TSA_KMS_HASH={{ tsa_kms_hash_algorithm}}
           TSA_SIGNER_TYPE={{ tsa_signer_type }}
           TSA_LOG_TYPE={{ tsa_log_type }}
           TSA_CERT_CHAIN_PATH={{ tsa_app_dir }}/certs/tsa-chain.pem
           AWS_REGION={{ ansible_ec2_instance_identity_document_region }}

     - name: Write tsa environment file
       copy:
         dest: /etc/tsa/tsa-server.env
         owner: root
         group: root
         mode: "0600"
         content: "{{ tsa_env_content }}"
       notify:
         - restart tsa service  

     - name: Create tsa systemd service
       template:
         src: ../templates/etc/systemd/system/{{ tsa_server_systemd_service_name }}.service.j2
         dest: /etc/systemd/system/{{ tsa_server_systemd_service_name }}.service
         mode: 0644
       notify: restart tsa service

     - name: Allow tsa http traffic through firewall
       ufw:
         port: "{{ tsa_server_port }}"
         proto: tcp
         rule: allow
       when: ansible_distribution == 'Ubuntu'

     # flush handlers for service restart, then ensure its started after.
     # prevents starting in task -> restarting in notified handlers during bootstrap, ensures its running for idempotent runs
     - name: Flush pending handlers
       meta: flush_handlers

     - name: Enable tsa systemd service
       service:
         name: "{{ tsa_server_systemd_service_name }}"
         enabled: true

   handlers:
     - name: restart tsa service
       systemd:
         name: "{{ tsa_server_systemd_service_name }}"
         state: restarted
         enabled: true
         daemon_reload: true
