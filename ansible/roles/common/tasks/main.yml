---
- name: Include OS variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "../vars/{{ ansible_distribution }}.yml"
    - "../vars/{{ ansible_os_family }}.yml"

- name: Print all variables for debugging
  ansible.builtin.debug:
    var: hostvars[inventory_hostname]
    verbosity: 2

- name: Set system timezone
  community.general.timezone:
    name: "{{ common_timezone }}"

- name: (Debian) Update apt repos
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 300
  when: ansible_os_family == 'Debian'

- name: (Debian) Upgrade apt packages
  ansible.builtin.apt:
    upgrade: dist
    cache_valid_time: 300
  when: ansible_os_family == 'Debian'

# snaps already automatically update but manually refresh them with shell command here
- name: (Debian) Upgrade snap packages
  ansible.builtin.command:
    cmd: /usr/bin/snap refresh
  changed_when: false
  when: ansible_os_family == 'Debian'

- name: Remove unwanted packages
  ansible.builtin.package:
    name: "{{ common_remove_package_names }}"
    state: absent

- name: Stop and disable unwanted services
  ansible.builtin.service:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop: "{{ common_disable_service_names }}"
  register: service_result
  failed_when:
    - service_result is failed
    - "'does not exist' not in service_result.msg"
    - "'Could not find the requested service' not in service_result.msg"

- name: (Debian) Disable multicast name resolution (listens on all addresses publicly)
  community.general.ini_file:
    path: /etc/systemd/resolved.conf
    mode: "0644"
    section: Resolve
    option: LLMNR
    value: "no"
  when: ansible_os_family == 'Debian'
  notify: Restart service systemd-resolved

- name: (RedHat) Upgrade dnf packages
  ansible.builtin.dnf:
    name: "*"
    state: installed
    update_cache: true
  when: ansible_os_family == 'RedHat'

- name: Install desired packages
  ansible.builtin.package:
    name: "{{ common_install_package_names }}"
    state: present

- name: (RedHat) Install python3-pip for awscli dependency
  ansible.builtin.dnf:
    name: python3-pip
    state: installed
  when: ansible_os_family == 'RedHat'

- name: (RedHat) install requests via pip
  ansible.builtin.pip:
    name: requests
    extra_args: --upgrade
  when: ansible_os_family == 'RedHat'

- name: (RedHat) install awscli via pip
  ansible.builtin.pip:
    name: awscli
    extra_args: --upgrade
  when: ansible_os_family == 'RedHat'

- name: (RedHat) Install nano for rhel8
  ansible.builtin.dnf:
    name: nano
    state: installed
  when: ansible_os_family == 'RedHat'

- name: (Ubuntu) Install awscli via snap for Ubuntu24
  community.general.snap:
    name: aws-cli
    classic: true
    state: present
  when: ansible_distribution == 'Ubuntu' and ansible_distribution_major_version == '24'

- name: (Debian) Install awscli via apt for debian based systems
  ansible.builtin.apt:
    name: awscli
    state: present
  when: (ansible_distribution == 'Debian') or (ansible_distribution == 'Ubuntu' and ansible_distribution_major_version != '24')

- name: (Debian) Configure apt daily update timing (unused)
  ansible.builtin.copy:
    mode: "0644"
    src: /etc/cron.daily/apt-compat
    dest: /etc/cron.daily/apt-compat
  when: ansible_os_family == 'Debian'

- name: (Debian) Configure apt auto upgrade settings
  ansible.builtin.template:
    src: etc/apt/apt.conf.d/20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"
  when: ansible_os_family == 'Debian'

- name: (Debian) Configure apt unattended upgrade
  ansible.builtin.copy:
    src: etc/apt/apt.conf.d/50unattended-upgrades
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    mode: "0644"
  when: ansible_os_family == 'Debian'

- name: (Debian) Configure apt update timing
  ansible.builtin.template:
    src: etc/systemd/system/timers.target.wants/apt-daily.timer.j2
    dest: /lib/systemd/system/apt-daily.timer
    mode: "0644"
  when: ansible_os_family == 'Debian'
  notify: Reload systemd configurations

- name: (Debian) Configure apt auto upgrade timing
  ansible.builtin.template:
    src: etc/systemd/system/timers.target.wants/apt-daily-upgrade.timer.j2
    dest: /lib/systemd/system/apt-daily-upgrade.timer
    mode: "0644"
  when: ansible_os_family == 'Debian'
  notify: Reload systemd configurations

- name: (Debian) Configure snap update timing/frequency
  ansible.builtin.command:
    cmd: /usr/bin/snap set system refresh.timer={{ common_snap_auto_update_schedule }}
  changed_when: false
  when: ansible_os_family == 'Debian'

- name: (Debian) Disable 99update-notifier, as it causes apt conflicts
  ansible.builtin.command:
    cmd: mv /etc/apt/apt.conf.d/99update-notifier /etc/apt/apt.conf.d/99update-notifier.disabled
    creates: /etc/apt/apt.conf.d/99update-notifier.disabled
    removes: /etc/apt/apt.conf.d/99update-notifier
  when: ansible_os_family == 'Debian'

- name: Download Amazon SSM agent package file
  ansible.builtin.get_url:
    url: "https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/{{ common_amazon_ssm_agent_package_path[ansible_architecture] }}/{{ common_amazon_ssm_agent_package_filename }}"
    dest: /root/{{ common_amazon_ssm_agent_package_filename }}
    mode: "0644"

- name: (Debian) Install Amazon SSM agent
  ansible.builtin.apt:
    deb: /root/{{ common_amazon_ssm_agent_package_filename }}
    state: present
  when: ansible_distribution == 'Debian'

- name: (RedHat) Install Amazon SSM agent
  ansible.builtin.dnf:
    file: /root/{{ common_amazon_ssm_agent_package_filename }}
    state: present
  when: ansible_distribution == 'RedHat'

- name: Set cosign arch
  ansible.builtin.set_fact:
    common_cosign_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

- name: Download cosign (pinned) and verify checksum
  ansible.builtin.get_url:
    url: "https://github.com/sigstore/cosign/releases/download/v{{ common_cosign_version[common_cosign_arch] }}/cosign-linux-{{ common_cosign_arch }}"
    dest: /usr/local/bin/cosign
    mode: "0755"
    owner: root
    group: root
    checksum: "sha256:{{ common_cosign_sha256[common_cosign_arch] }}"

- name: Smoke test cosign
  ansible.builtin.command: /usr/local/bin/cosign version
  changed_when: false

## Run AWS SSM patches

- name: Remove extra stuff from login banners
  ansible.builtin.copy:
    src: etc/update-motd.d/10-help-text
    dest: /etc/update-motd.d/10-help-text
    mode: "0644"
    # backup: true
  when: ansible_distribution == 'Ubuntu'

- name: Remove ESM info from login banners
  ansible.builtin.file:
    path: /var/lib/update-notifier/hide-esm-in-motd
    state: touch
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: "0600"
  notify: Reload-motd-updates

- name: Disable motd-news
  ansible.builtin.lineinfile:
    path: /etc/default/motd-news
    regexp: "^.*ENABLED=.*"
    line: "ENABLED=0"
    # backup: true
    backrefs: false
    create: true
    mode: "0644"

- name: Setup our motd
  ansible.builtin.copy:
    src: etc/motd
    dest: /etc/motd
    mode: "0644"
    # backup: true

# Using AWS ntp servers so we can filter egress heavily
- name: Configure NTP servers (aws vpc timeserver only)
  become: true
  ansible.builtin.lineinfile:
    path: /etc/chrony/chrony.conf
    insertbefore: EOF
    line: "server 169.254.169.123 prefer iburst minpoll 4 maxpoll 4"
    state: present

- name: Remove other NTP servers (so we can heavily filter egress)
  become: true
  ansible.builtin.replace:
    path: /etc/chrony/chrony.conf
    regexp: "^(pool|server)\\s+(?!169\\.254\\.169\\.123).*"
    replace: "# \\g<0>"

- name: Allocate swap file
  ansible.builtin.command:
    cmd: "fallocate -l {{ common_swap_file_size }} {{ common_swap_file_path }}"
    creates: "{{ common_swap_file_path }}"
  when: common_swap_file_enabled

- name: Set swap file permissions
  ansible.builtin.file:
    path: "{{ common_swap_file_path }}"
    mode: "0600"

- name: Check if swap file is already formatted
  ansible.builtin.command:
    cmd: blkid -t TYPE=swap {{ common_swap_file_path }}
  register: swap_check
  changed_when: false
  failed_when: false

- name: Initialize swap file
  ansible.builtin.command:
    cmd: mkswap {{ common_swap_file_path }}
  when: swap_check.rc != 0
  changed_when: true

- name: Add swap to /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "{{ common_swap_file_path }} none swap sw 0 0"
    mode: "0644"
    # backup: true
    create: true

- name: Add sysctl swap configuration
  ansible.builtin.copy:
    src: etc/sysctl.d/99-swap.conf
    dest: /etc/sysctl.d/99-swap.conf
    mode: "0644"
  when: ansible_os_family == 'Debian'

# too many deploy failures from apt related tasks, doing this in common for golden amis from now on since all nodes use alloy
- name: Install dependency packages
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop:
    - apt-transport-https
    - software-properties-common

- name: Install the grafana gpg key
  ansible.builtin.get_url:
    url: https://apt.grafana.com/gpg.key
    dest: /usr/share/keyrings/grafana-archive-keyring.gpg
    mode: "0644"
    owner: root
    group: root

- name: Ensure grafana gpg key is 644 not 640 or apt breaks
  ansible.builtin.file:
    path: /usr/share/keyrings/grafana-archive-keyring.gpg
    mode: "0644"
    owner: root
    group: root

- name: Add the grafana apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/grafana-archive-keyring.gpg] https://apt.grafana.com stable main"
    state: present
    filename: grafana
    # causing apt locks somehow
    update_cache: true

- name: Install the alloy package
  ansible.builtin.package:
    name: alloy
    state: present

- name: Ensure alloy isnt running (default config now, nodes will configure and enable it)
  ansible.builtin.systemd:
    name: alloy
    enabled: false
    state: stopped
