---
 - name: sitesuper-web playbook
   hosts: all
   become: true
   vars_files:
     - ../vars/default.yml
     - ../vars/{{ ansible_os_family }}.yml

   tasks:
     - name: Get instance metadata
       ec2_metadata_facts:

     - name: Print all environment vars for debugging
       debug:
         var: hostvars[inventory_hostname]
         verbosity: 2

     - name: Ensure required variables are defined
       fail:
         msg: "{{ item }} must be defined use -e {{ item }}=value"
       when: (lookup('vars', item, default=None)) is none
       loop:
         - env

     - name: Create sitesuper-web user
       user:
         name: "{{ sitesuper_web_system_user }}"
         password: '*'
         umask: 0027
         shell: /usr/sbin/nologin
         system: true

     - name: Create sitesuper bin, log directories
       file:
         path: /home/{{ sitesuper_web_system_user }}/{{ item }}
         owner: "{{ sitesuper_web_system_user }}"
         group: "{{ sitesuper_web_system_user }}"
         mode: 0750
         state: directory
       loop:
         - bin
         - log

     - name: Set release tag fact
       set_fact:
         sitesuper_web_release_tag: "{{ sitesuper_web_release_info.json.tag_name }}"

     - name: Get latest sitesuper-web release info from parameter store
       uri:
         url: https://api.github.com/repos/FIXME/sitesuper-web/releases/latest
         return_content: yes
       register: sitesuper_release_info

     - name: Get sitesuper-web release from s3
       uri:
         url: https://api.github.com/repos/FIXME/sitesuper-web/releases/latest
         return_content: yes
       register: sitesuper_release_info

     - name: Set filename based on architecture
       set_fact:
         sitesuper_web_filename: >-
           {%- if ansible_architecture == "aarch64" -%}
           linux-arm64
           {%- else -%}
           linux-amd64
           {%- endif -%}

     - name: Download the latest sitesuper-web ({{ sitesuper_web_release_tag }}) linux-amd64 release from s3 ({{ sitesuper_web_asset_url }})
       get_url:
         url: "{{ sitesuper_web_asset_url }}"
         dest: /home/{{ sitesuper_web_system_user }}/bin/sitesuper-web

     - name: Create sitesuper-web systemd service
       template:
         src: ../templates/etc/systemd/system/{{ sitesuper_web_systemd_service_name }}.service.j2
         dest: /etc/systemd/system/{{ sitesuper_web_systemd_service_name }}.service
         mode: 0644
       notify: restart sitesuper-web service

     - name: Enable sitesuper-web systemd service
       systemd:
         name: "{{ sitesuper_web_systemd_service_name }}"
         state: started
         enabled: true
         daemon_reload: true

     - name: Allow sitesuper-web traffic through firewall
       ufw:
         port: "{{ sitesuper_web_tcp_port }}"
         proto: tcp
         rule: allow
       when: ansible_distribution == 'Ubuntu'

     - name: Create oauth2-proxy user
       user:
         name: "{{ oauth2proxy_system_user }}"
         password: '*'
         umask: 0027
         shell: /usr/sbin/nologin
         system: true

     - name: Get latest oauth2-proxy release name from github redirect
       uri:
         url: https://github.com/oauth2-proxy/oauth2-proxy/releases/latest
         method: HEAD
         return_content: no
       register: latest_release_redirect

     - name: Get release version from URL
       set_fact:
         latest_version: "{{ latest_release_redirect.url | regex_replace('^.*/tag/', '') }}"

     - name: Set filename based on architecture
       set_fact:
         oauth_arch: >-
           {%- if ansible_architecture == "aarch64" -%}
           linux-arm64
           {%- else -%}
           linux-amd64
           {%- endif -%}

     - name: Build download url for latest release
       set_fact:
         download_url: "https://github.com/oauth2-proxy/oauth2-proxy/releases/download/{{ latest_version }}/oauth2-proxy-{{ latest_version }}.{{ oauth_arch }}.tar.gz"

     - name: Download the latest oauth2-proxy release
       get_url:
         url: "{{ download_url }}"
         dest: /home/{{ oauth2proxy_system_user }}/oauth2-proxy.tar.gz

     - name: Create oauth2-proxy bin, conf, log directories
       file:
         path: /home/{{ oauth2proxy_system_user }}/{{ item }}
         owner: "{{ oauth2proxy_system_user }}"
         group: "{{ oauth2proxy_system_user }}"
         mode: 0750
         state: directory
       loop:
         - bin
         - conf
         - log

     - name: Decompress oauth2proxy package
       unarchive:
         src: /home/{{ oauth2proxy_system_user }}/oauth2-proxy.tar.gz
         dest: /home/{{ oauth2proxy_system_user }}/bin
         extra_opts: ['--strip-components=1','--show-stored-names']
         owner: "{{ oauth2proxy_system_user }}"
         group: "{{ oauth2proxy_system_user }}"
         mode: 0750
         creates: /home/{{ oauth2proxy_system_user }}/bin/oauth2-proxy

     - name: Remove the oauth2-proxy installation package
       file:
         path: /home/{{ oauth2proxy_system_user }}/oauth2-proxy.tar.gz
         state: absent

     - name: Create oauth2-proxy systemd service
       template:
         src: ../templates/etc/systemd/system/{{ oauth2proxy_systemd_service_name }}.service.j2
         dest: /etc/systemd/system/{{ oauth2proxy_systemd_service_name }}.service
         mode: 0644
       notify: restart oauth2-proxy service

     - name: Modify oauth2-proxy main configuration
       template:
         src: ../templates/oauth2-proxy/conf/oauth2-proxy.conf.j2
         dest: /home/{{ oauth2proxy_system_user }}/conf/oauth2-proxy.conf
         mode: 0644
       notify: restart oauth2-proxy service
       when: ansible_os_family == 'Debian'

     - name: Run handlers immediately to refresh systemd daemon configuration
       meta: flush_handlers

     - name: Enable oauth2-proxy systemd service
       service:
         name: "{{ oauth2proxy_systemd_service_name }}"
         state: started
         enabled: true

     - name: Allow oauth2-proxy traffic through firewall
       ufw:
         port: "{{ oauth2proxy_tcp_port }}"
         proto: tcp
         rule: allow
       when: ansible_distribution == 'Ubuntu'

   handlers:
     - name: restart oauth2-proxy service
       service:
         name: "{{ oauth2proxy_systemd_service_name }}"
         state: restarted
         enabled: true
         daemon_reload: true

     - name: restart sitesuper-web service
       systemd:
         name: "{{ sitesuper_web_systemd_service_name }}"
         state: restarted
         enabled: true
         daemon_reload: true
