- name: Get pinned blackbox_exporter release from s3 artifacts bucket
  amazon.aws.s3_object:
    bucket: "{{ artifacts_bucket_name }}"
    object: "thirdparty/prometheus/blackbox_exporter/v{{ prometheus_blackbox_exporter_version }}/blackbox_exporter-{{ prometheus_blackbox_exporter_version }}.linux-{{ arch_normalized }}.tar.gz"
    dest: /home/{{ prometheus_system_user }}/blackbox_exporter.tar.gz
    mode: get
    overwrite: different

- name: Decompress blackbox_exporter installation package
  ansible.builtin.unarchive:
    src: /home/{{ prometheus_system_user }}/blackbox_exporter.tar.gz
    dest: /home/{{ prometheus_system_user }}/bin
    extra_opts: ["--strip-components=1", "--show-stored-names"]
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
    mode: "0750"
    creates: /home/{{ prometheus_system_user }}/bin/blackbox_exporter

- name: Remove the blackbox_exporter installation package
  ansible.builtin.file:
    path: /home/{{ prometheus_system_user }}/blackbox_exporter.tar.gz
    state: absent

- name: Modify blackbox_exporter main configuration
  ansible.builtin.template:
    src: blackbox_exporter/conf/blackbox.yml.j2
    dest: /home/{{ prometheus_system_user }}/conf/blackbox.yml
    mode: "0644"
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
  notify: Restart blackbox_exporter service

- name: Create blackbox_exporter systemd service
  ansible.builtin.template:
    src: etc/systemd/system/{{ prometheus_blackbox_exporter_systemd_service_name }}.service.j2
    dest: /etc/systemd/system/{{ prometheus_blackbox_exporter_systemd_service_name }}.service
    mode: "0644"
  notify: Restart blackbox_exporter service
