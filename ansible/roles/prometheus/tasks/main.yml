---
- name: Include OS variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "../vars/{{ ansible_distribution }}.yml"
    - "../vars/{{ ansible_os_family }}.yml"

- name: Get instance metadata
  amazon.aws.ec2_metadata_facts:

- name: Set facts from ssm here since they require ec2 metadata to lookup region
  ansible.builtin.set_fact:
    account_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/account/name', region=ansible_ec2_instance_identity_document_region) }}"
    artifacts_bucket_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/artifacts/bucket/name', region=ansible_ec2_instance_identity_document_region) }}"
    company_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/company/name', region=ansible_ec2_instance_identity_document_region) }}"
    env: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/name', region=ansible_ec2_instance_identity_document_region) }}"
    hosted_zone_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/dns/hosted_zone/name', region=ansible_ec2_instance_identity_document_region) }}"
    platform_env: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/name', region=ansible_ec2_instance_identity_document_region) }}"
    alerts_push_endpoints: "{{ lookup('amazon.aws.aws_ssm', '/platform/obs/alerts/push/endpoint', region=ansible_ec2_instance_identity_document_region) }}"
    metrics_push_endpoint: "{{ lookup('amazon.aws.aws_ssm', '/platform/obs/metrics/push/endpoint', region=ansible_ec2_instance_identity_document_region) }}"

- name: Load account-specific Prometheus vars
  ansible.builtin.include_vars:
    file: "../vars/env/{{ account_name }}.yml"

- name: Set facts from environment variables
  ansible.builtin.set_fact:
    service_name: "{{ ansible_env.SERVICENAME | default('unknown') }}"
    service_component: "{{ ansible_env.SERVICECOMPONENT | default(ansible_env.SERVICENAME | default('unknown')) }}"
    project: "{{ ansible_env.PROJECT | default('unknown') }}"
    service_namespace: "{{ ansible_env.NAMESPACE | default('unknown') }}"

- name: Set variable for hostname without instanceid used to correlate metric, logs, traces, profiles, etc
  ansible.builtin.set_fact:
    hostname_no_instanceid: "{{ ansible_hostname.split('-')[0:-1] | join('-') }}"

- name: Print all environment vars for debugging
  ansible.builtin.debug:
    var: hostvars[inventory_hostname]
    verbosity: 2

- name: Ensure required variables are defined
  ansible.builtin.fail:
    msg: "{{ item }} must be defined use -e {{ item }}=value or set the associated ENV var"
  when: vars[item] is not defined or vars[item] is none
  loop:
    - platform_env
    - service_name
    - service_component
    - project
    - service_namespace
    - hostname_no_instanceid

- name: Create prometheus user
  ansible.builtin.user:
    name: "{{ prometheus_system_user }}"
    password: "*"
    umask: "027"
    shell: /usr/sbin/nologin
    system: true

- name: Set normalized architecture name
  ansible.builtin.set_fact:
    arch_normalized: >-
      {%- if ansible_architecture == "aarch64" -%} arm64{%- else -%} amd64{%- endif -%}

- name: Get pinned prometheus release from s3 artifacts bucket
  amazon.aws.s3_object:
    bucket: "{{ artifacts_bucket_name }}"
    object: "thirdparty/prometheus/prometheus/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-{{ arch_normalized }}.tar.gz"
    dest: /home/{{ prometheus_system_user }}/prometheus.tar.gz
    mode: get
    overwrite: different

- name: Create prometheus bin, conf, data, scrapedata directories
  ansible.builtin.file:
    path: /home/{{ prometheus_system_user }}/{{ item }}
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
    mode: "0750"
    state: directory
  loop:
    - bin
    - bin/sd
    - conf
    - conf/rules
    - conf/rules/recording
    - conf/rules/recording/node
    - conf/rules/recording/apps
    - conf/rules/alerting
    - conf/rules/alerting/node
    - conf/rules/alerting/apps
    - conf/scrape.d/
    - conf/scrape.d/apps
    - conf/scrape.d/node
    - conf/scrape.d/blackbox
    - conf/file_sd.d/
    - conf/file_sd.d/blackbox-http
    - data
    - scrapedata

- name: Decompress prometheus installation package
  ansible.builtin.unarchive:
    src: /home/{{ prometheus_system_user }}/prometheus.tar.gz
    dest: /home/{{ prometheus_system_user }}/bin
    extra_opts: ["--wildcards", "--strip-components=1", "--show-stored-names"]
    include: ["*/prometheus", "*/promtool"]
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
    mode: "0750"
    creates: /home/{{ prometheus_system_user }}/bin/prometheus

- name: Remove the prometheus installation package
  ansible.builtin.file:
    path: /home/{{ prometheus_system_user }}/prometheus.tar.gz
    state: absent

- name: Modify prometheus main configuration
  ansible.builtin.template:
    src: prometheus/conf/prometheus.yml.j2
    dest: /home/{{ prometheus_system_user }}/conf/prometheus.yml
    mode: "0644"
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
  notify: Restart prometheus service

- name: Create prometheus node scrape target configurations
  ansible.builtin.template:
    src: prometheus/conf/scrape.d/node/{{ item }}.yml.j2
    dest: /home/{{ prometheus_system_user }}/conf/scrape.d/node/{{ item }}.yml
    mode: "0644"
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
  notify: Restart prometheus service
  loop: "{{ prometheus_config.scrape.node | default([]) }}"

- name: Create prometheus app scrape target configurations
  ansible.builtin.template:
    src: prometheus/conf/scrape.d/apps/{{ item }}.yml.j2
    dest: /home/{{ prometheus_system_user }}/conf/scrape.d/apps/{{ item }}.yml
    mode: "0644"
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
  notify: Restart prometheus service
  loop: "{{ prometheus_config.scrape.apps | default([]) }}"

- name: Create blackbox_exporter scrape job configurations
  ansible.builtin.template:
    src: prometheus/conf/scrape.d/blackbox/{{ item }}.yml.j2
    dest: /home/{{ prometheus_system_user }}/conf/scrape.d/blackbox/{{ item }}.yml
    mode: "0644"
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
  notify: Restart prometheus service
  loop: "{{ prometheus_config.scrape.blackbox | default([]) }}"

- name: Create blackbox_exporter file_sd target configurations
  ansible.builtin.template:
    src: prometheus/conf/file_sd.d/blackbox-http/{{ item }}.yml.j2
    dest: /home/{{ prometheus_system_user }}/conf/file_sd.d/blackbox-http/{{ item }}.yml
    mode: "0644"
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
  notify: Restart prometheus service
  loop: "{{ prometheus_config.scrape.blackbox_http | default([]) }}"

- name: Copy recording rules
  ansible.builtin.copy:
    src: prometheus/conf/rules/{{ item }}.yml
    dest: /home/{{ prometheus_system_user }}/conf/rules/recording/{{ item }}.yml
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
    mode: "0640"
  notify: Restart prometheus service
  loop: "{{ prometheus_config.rules.recording | default([]) }}"

- name: Copy alerting rules
  ansible.builtin.copy:
    src: prometheus/conf/rules/{{ item }}.yml
    dest: /home/{{ prometheus_system_user }}/conf/rules/alerting/{{ item }}.yml
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
    mode: "0640"
  notify: Restart prometheus service
  loop: "{{ prometheus_config.rules.alerting | default([]) }}"

- name: Create prometheus systemd service
  ansible.builtin.template:
    src: etc/systemd/system/{{ prometheus_systemd_service_name }}.service.j2
    dest: /etc/systemd/system/{{ prometheus_systemd_service_name }}.service
    mode: "0644"
  notify: Restart prometheus service

- name: Allow prometheus traffic through firewall
  community.general.ufw:
    port: "{{ prometheus_tcp_port }}"
    proto: tcp
    rule: allow
  when: ansible_distribution == 'Ubuntu'

- name: Tune some sysctl parameters for networking
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    state: present
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.conf
  loop:
    - { name: net.ipv4.icmp_ratelimit, value: 0 }
    - { name: net.ipv4.icmp_msgs_burst, value: 0 }
    - { name: net.ipv4.icmp_msgs_per_sec, value: 0 }
    - { name: net.ipv4.icmp_ratemask, value: 0 }
    - { name: net.core.rmem_max, value: 26214400 }
    - { name: net.core.wmem_max, value: 26214400 }
    - { name: net.core.rmem_default, value: 26214400 }
    - { name: net.core.wmem_default, value: 26214400 }
    - { name: net.core.netdev_max_backlog, value: 5000 }

