- name: Set normalized architecture name
  set_fact:
    arch_normalized: >-
      {%- if ansible_architecture == "aarch64" -%}
      arm64
      {%- else -%}
      amd64
      {%- endif -%}

- name: Get pinned prometheus release from s3 artifacts bucket 
  amazon.aws.s3_object:
    bucket: "{{ artifacts_bucket_name }}"
    object: "thirdparty/prometheus/prometheus/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-{{ arch_normalized }}.tar.gz"
    dest: /home/{{ prometheus_system_user }}/prometheus.tar.gz
    mode: get
    overwrite: different

- name: Create prometheus bin, conf, data, scrapedata directories
  file:
    path: /home/{{ prometheus_system_user }}/{{ item }}
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
    mode: 0750
    state: directory
  loop:
    - bin
    - bin/sd
    - conf
    - conf/rules
    - conf/rules/recording
    - conf/rules/recording/node
    - conf/rules/recording/apps
    - conf/rules/alerting
    - conf/rules/alerting/node
    - conf/rules/alerting/apps
    - conf/scrape.d/
    - conf/scrape.d/apps
    - conf/scrape.d/node
    - conf/scrape.d/blackbox
    - conf/file_sd.d/
    - conf/file_sd.d/blackbox-http
    - data
    - scrapedata

- name: Decompress prometheus installation package
  unarchive:
    src: /home/{{ prometheus_system_user }}/prometheus.tar.gz
    dest: /home/{{ prometheus_system_user }}/bin
    extra_opts: ['--wildcards', '--strip-components=1','--show-stored-names']
    include: ["*/prometheus", "*/promtool"]
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
    mode: 0750
    creates: /home/{{ prometheus_system_user }}/bin/prometheus

- name: Remove the prometheus installation package
  file:
    path: /home/{{ prometheus_system_user }}/prometheus.tar.gz
    state: absent

- name: Modify prometheus main configuration
  template:
    src: ../templates/prometheus/conf/prometheus.yml.j2
    dest: /home/{{ prometheus_system_user }}/conf/prometheus.yml
    mode: 0644
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
  notify: restart prometheus service

- name: Create prometheus node scrape target configurations
  template:
    src: ../templates/prometheus/conf/scrape.d/node/{{ item }}.yml.j2
    dest: /home/{{ prometheus_system_user }}/conf/scrape.d/node/{{ item }}.yml
    mode: 0644
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
  notify: restart prometheus service
  loop: "{{ prometheus.scrape.node | default([]) }}"

- name: Create prometheus app scrape target configurations
  template:
    src: ../templates/prometheus/conf/scrape.d/apps/{{ item }}.yml.j2
    dest: /home/{{ prometheus_system_user }}/conf/scrape.d/apps/{{ item }}.yml
    mode: 0644
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
  notify: restart prometheus service
  loop: "{{ prometheus.scrape.apps | default([]) }}"

- name: Create blackbox_exporter scrape job configurations
  template:
    src: ../templates/prometheus/conf/scrape.d/blackbox/{{ item }}.yml.j2
    dest: /home/{{ prometheus_system_user }}/conf/scrape.d/blackbox/{{ item }}.yml
    mode: 0644
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
  notify: restart prometheus service
  loop: "{{ prometheus.scrape.blackbox | default([]) }}"

- name: Create blackbox_exporter file_sd target configurations
  template:
    src: ../templates/prometheus/conf/file_sd.d/blackbox-http/{{ item }}.yml.j2
    dest: /home/{{ prometheus_system_user }}/conf/file_sd.d/blackbox-http/{{ item }}.yml
    mode: 0644
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
  notify: restart prometheus service
  loop: "{{ prometheus.scrape.blackbox_http | default([]) }}"

- name: Copy recording rules
  copy:
    src: ../files/prometheus/conf/rules/{{ item }}.yml
    dest: /home/{{ prometheus_system_user }}/conf/rules/recording/{{ item }}.yml
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
    mode: 0640
  notify: restart prometheus service
  loop: "{{ prometheus.rules.recording | default([]) }}"

- name: Copy alerting rules
  copy:
    src: ../files/prometheus/conf/rules/{{ item }}.yml
    dest: /home/{{ prometheus_system_user }}/conf/rules/alerting/{{ item }}.yml
    owner: "{{ prometheus_system_user }}"
    group: "{{ prometheus_system_user }}"
    mode: 0640
  notify: restart prometheus service
  loop: "{{ prometheus.rules.alerting | default([]) }}"

- name: Create prometheus systemd service
  template:
    src: ../templates/etc/systemd/system/{{ prometheus_systemd_service_name }}.service.j2
    dest: /etc/systemd/system/{{ prometheus_systemd_service_name }}.service
    mode: 0644
  notify: restart prometheus service

- name: Allow prometheus traffic through firewall
  ufw:
    port: "{{ prometheus_tcp_port }}"
    proto: tcp
    rule: allow
  when: ansible_distribution == 'Ubuntu'

- name: Tune some sysctl parameters for networking
  sysctl:
    name: "{{ item.name }}"
    state: present
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.conf
  loop:
  - { name: net.ipv4.icmp_ratelimit, value: 0 }
  - { name: net.ipv4.icmp_msgs_burst, value: 0 }
  - { name: net.ipv4.icmp_msgs_per_sec, value: 0 }
  - { name: net.ipv4.icmp_ratemask, value: 0 }
  - { name: net.core.rmem_max, value: 26214400 }
  - { name: net.core.wmem_max, value: 26214400 }
  - { name: net.core.rmem_default, value: 26214400 }
  - { name: net.core.wmem_default, value: 26214400 }
  - { name: net.core.netdev_max_backlog, value: 5000 }

