groups:
  - name: diskSpace
    interval: 30s
    rules:
      - record: node_filesystem_avail_gb
        expr: node_filesystem_avail_bytes / 1024 / 1024 / 1024

      - alert: LowDiskSpaceFree
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs"} / node_filesystem_size_bytes{fstype!~"tmpfs"}) * 100 < 10
        for: 1m
        labels:
          severity: crit
          team: infra
        annotations:
          summary: "Disk space critically low on {{ $labels.node }} ({{ $labels.mountpoint }})"
          description: "Disk {{ $labels.device }} ({{ $labels.mountpoint }}) has < 10% free on {{ $labels.node }}."

      - alert: WarningDiskSpaceFree
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs"} / node_filesystem_size_bytes{fstype!~"tmpfs"}) * 100 < 20
        for: 1m
        labels:
          severity: warn
          team: infra
        annotations:
          summary: "Low disk space on {{ $labels.node }} ({{ $labels.mountpoint }})"
          description: >-
            Disk {{ $labels.device }} ({{ $labels.mountpoint }}) on {{ $labels.node }}
            has {{ printf "%.1f" $value }}% free.

      - alert: DiskFillingSoon12h
        expr: |
          (
            node_filesystem_avail_bytes{
              job="aws-sd-infra",
              fstype!~"tmpfs|squashfs|overlay"
            }
            /
            clamp_min(
              -delta(
                node_filesystem_avail_bytes{
                  job="aws-sd-infra",
                  fstype!~"tmpfs|squashfs|overlay"
                }[4h]
              ) / (4 * 3600),
              1
            )
            / 3600
          ) < 12
          and on (instance, device, mountpoint)
            (
              (node_filesystem_size_bytes{job="aws-sd-infra"}
               - node_filesystem_avail_bytes{job="aws-sd-infra"})
              / node_filesystem_size_bytes{job="aws-sd-infra"}
            ) > 0.50
          and on (instance, device, mountpoint)
            count_over_time(
              node_filesystem_avail_bytes{job="aws-sd-infra"}[4h]
            ) > 100
        for: 5m
        labels:
          severity: warn
          team: infra
        annotations:
          summary: "Disk filling soon on {{ $labels.node }} ({{ $labels.mountpoint }})"
          description: "At the current net 4h write rate, disk {{ $labels.mountpoint }} on {{ $labels.node }} will be full in under 12 hours."

      - alert: FileDescriptorsNearLimit
        expr: (node_filefd_allocated / node_filefd_maximum) > 0.85
        for: 10m
        labels:
          severity: warn
          team: infra
        annotations:
          summary: "File descriptors near limit on {{ $labels.node }}"
          description: "FDs > 85% of system limit; may hit EMFILE soon."

      - alert: FilesystemInodesLow
        expr: (node_filesystem_files_free{fstype!~"tmpfs"}
               / node_filesystem_files{fstype!~"tmpfs"}) < 0.10
        for: 5m
        labels:
          severity: warn
          team: infra
        annotations:
          summary: "Inodes low on {{ $labels.node }} {{ $labels.mountpoint }}"
          description: "Filesystem {{ $labels.device }} has <10% free inodes."
