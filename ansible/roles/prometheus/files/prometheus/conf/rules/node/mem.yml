groups:
- name: nodeMem
  rules:
  - alert: MemoryPressure
    expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
    for: 15m
    labels:
      severity: crit
      team: infra
    annotations:
      summary: "Memory pressure on {{ $labels.node }}"
      description: "Available memory < 10% for 15m. OOM risk is high."

#  - alert: SwapAnyUse
#    expr: (node_memory_SwapTotal_bytes > 0)
#          and (node_memory_SwapTotal_bytes - node_memory_SwapFree_bytes) > 384 * 1024 * 1024
#    for: 10m
