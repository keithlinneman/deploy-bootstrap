#      severity: warn
#      team: infra
#    annotations:
#      summary: "Swap in use on {{ $labels.node }}"
#      description: "Swap usage > 384MiB for 10m; host has been under memory pressure."

#  - alert: SwapCritical
#    expr: (node_memory_SwapTotal_bytes > 0)
#          and (node_memory_SwapTotal_bytes - node_memory_SwapFree_bytes) > 512 * 1024 * 1024
#    for: 5m
