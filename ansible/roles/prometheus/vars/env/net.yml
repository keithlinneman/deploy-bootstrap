---
prometheus_config:
  scrape:
    apps:
      - prometheus
    node:
      - node-exporter
      - ebpf-exporter
  rules:
    alerting:
      - apps/prometheus-alerts
      - apps/wireguard-alerts
      - node/cpu
      - node/disk
      - node/mem
      - node/net
      - node/os
      - node/time
      - node/up
