---
- name: Restart prometheus service
  ansible.builtin.systemd:
    name: "{{ prometheus_systemd_service_name }}"
    state: restarted
    enabled: true
    daemon_reload: true

- name: Restart blackbox_exporter service
  ansible.builtin.systemd:
    name: "{{ prometheus_blackbox_exporter_systemd_service_name }}"
    state: restarted
    enabled: true
    daemon_reload: true
