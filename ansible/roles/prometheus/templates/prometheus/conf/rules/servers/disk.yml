Zgroups:
  - name: disk_alerts
    interval: 30s
    labels:
      region: us-east-2
      env: prod
      team: infra
    rules:
      - record: node_filesystem_avail_gb_test
        expr: node_filesystem_avail_bytes / 1024 / 1024 / 1024
      - alert: LowDiskSpaceFree
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs"} / node_filesystem_size_bytes{fstype!~"tmpfs"}) * 100 < 10
        for: 1m
        labels:
          severity: critical
          team: infra
        annotations:
          summary: "Disk space critically low on {{ $labels.instance }}"
          description: "Disk {{ $labels.mountpoint }} on {{ $labels.instance }} has less than 10% free space"

      - alert: WarningDiskSpaceFree
        #expr: (node_filesystem_avail_bytes{fstype!~"tmpfs"} / node_filesystem_size_bytes{fstype!~"tmpfs"}) * 100 < 20
        #expr: (node_filesystem_avail_bytes{fstype!~"tmpfs"} / node_filesystem_size_bytes{fstype!~"tmpfs"}) * 100 < 20
        expr: |
         ((node_filesystem_avail_bytes{fstype!~"tmpfs"} / node_filesystem_size_bytes{fstype!~"tmpfs"}) * 100 < 20)
         * on (instance, mountpoint)
         group_left(node_filesystem_avail_gb, node_filesystem_size_gb, node_filesystem_used_gb)
         (
           node_filesystem_avail_bytes / 1024 / 1024 / 1024,
           node_filesystem_size_bytes / 1024 / 1024 / 1024,
           (node_filesystem_size_bytes - node_filesystem_avail_bytes) / 1024 / 1024 / 1024
         )
        for: 1m
        labels:
          severity: warning
          team: infra
          disk_avail_gb: "{{ $labels.node_filesystem_avail_gb }}"
          disk_total_gb: "{{ $labels.node_filesystem_size_gb }}"
          disk_used_gb: "{{ $labels.node_filesystem_used_gb }}"
        annotations:
          summary: "Low disk space on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Disk {{ $labels.device }} ({{ $labels.mountpoint }}) on {{ $labels.instance }} has {{ $labels.disk_free_percent }}% free space ({{ $labels.node_filesystem_avail_gb }} / {{ $labels.node_filesystem_size_gb }} GB)"

      - alert: WarningDiskSpaceGrowth4hours
        expr: predict_linear(node_filesystem_avail_bytes{job="node"}[1h], 4 * 3600) < 0
        for: 5m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "Disk space trend warning on {{ $labels.instance }} disk {{ $labels.mountpoint }}"
          description: "The disk {{ $labels.mountpoint }} on {{ $labels.instance }} is predicted to be full in less than 4 hours at the rate of growth over the last hour"

      - alert: WarningDiskSpaceGrowth3day
        expr: predict_linear(node_filesystem_avail_bytes{job="node"}[12h], 72 * 3600) < 0
        for: 5m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "Disk space trend warning on {{ $labels.instance }} disk {{ $labels.mountpoint }}"
          description: "The disk {{ $labels.mountpoint }} on {{ $labels.instance }} is predicted to be full in the next 3 days at the rate of growth over the last day"

      - alert: WarningDiskSpaceGrowth1week
        expr: predict_linear(node_filesystem_avail_bytes{job="node"}[24h], 168 * 3600) < 0
        for: 5m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "Disk space trend warning on {{ $labels.instance }} disk {{ $labels.mountpoint }}"
          description: "The disk {{ $labels.mountpoint }} on {{ $labels.instance }} is predicted to be full in the next week at the rate of growth over the last day"
