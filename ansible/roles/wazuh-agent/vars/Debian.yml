---
wazuh_agent_package_name: wazuh-agent
wazuh_agent_package_version: 4.14.4-1
wazuh_agent_systemd_service_name: wazuh-agent
wazuh_agent_system_user: wazuh
wazuh_agent_ossec_base_path: /var/ossec
wazuh_agent_ossec_config_base_path: "{{ wazuh_agent_ossec_base_path }}/etc"
# wazuh_agent_ossec_config_ssl_path: "{{ wazuh_agent_ossec_config_base_path }}/ssl"
wazuh_agent_ossec_netstat_listening_ports_cmd: ss -tulpn | tail -n +2 | awk '{printf "%s %s %s %s\n", $1, $5, $6, $7}' | sort -u