---
 - name: vigil playbook
   hosts: all
   become: true
   vars_files:
     - ../vars/default.yml
     - ../vars/{{ ansible_os_family }}.yml

   pre_tasks:
     - name: Get instance metadata
       ec2_metadata_facts:

     - name: Set facts from ssm here since they require ec2 metadata to lookup region
       set_fact:
         account_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/account/name', region=ansible_ec2_instance_identity_document_region ) }}"
         artifacts_bucket_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/artifacts/bucket/name', region=ansible_ec2_instance_identity_document_region ) }}"
         company_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/company/name', region=ansible_ec2_instance_identity_document_region ) }}"
         hosted_zone_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/dns/hosted_zone/name', region=ansible_ec2_instance_identity_document_region ) }}"
         platform_env: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/name', region=ansible_ec2_instance_identity_document_region ) }}"
         otlp_profiles_endpoint: "{{ lookup('amazon.aws.aws_ssm', '/platform/obs/profiles/push/endpoint', region=ansible_ec2_instance_identity_document_region ) }}"
         vigil_config_database_credentials: "{{ lookup('amazon.aws.aws_secret', 'app/vigil/server/db/postgres/credentials', region=ansible_ec2_instance_identity_document_region ) }}"
         vigil_config_llm_claude_key: "{{ lookup('amazon.aws.aws_secret', 'app/vigil/server/llm/claude/key', region=ansible_ec2_instance_identity_document_region ) }}"
         vigil_server_release_id: "{{ lookup('amazon.aws.aws_ssm', '/app/vigil/server/deploy/stable/release/id', region=ansible_ec2_instance_identity_document_region ) }}"

     - name: Set facts from environment variables
       set_fact:
         service_name: "{{ ansible_env.SERVICENAME | default('unknown') }}"
         service_component: "{{ ansible_env.SERVICECOMPONENT | default(ansible_env.SERVICENAME | default('unknown')) }}"
         project: "{{ ansible_env.PROJECT | default('unknown') }}"
         namespace: "{{ ansible_env.NAMESPACE | default('unknown') }}"

     - name: Build database connection string
       set_fact:
         vigil_database_url: "postgres://{{ vigil_config_database_credentials.username }}:{{ vigil_config_database_credentials.password }}@{{ vigil_config_database_credentials.host }}:{{ vigil_config_database_credentials.port }}/vigil?sslmode=require"

     - name: Set base application directory
       set_fact:
         vigil_app_dir: "/opt/vigil/server"

     - name: Print all environment vars for debugging
       debug:
         var: hostvars[inventory_hostname]
         verbosity: 2

     - name: Ensure required variables are defined
       fail:
         msg: "{{ item }} must be defined use -e {{ item }}=value"
       when: (lookup('vars', item, default=None)) is none
       with_items:
         - account_name
         - company_name
         - hosted_zone_name
         - platform_env
         - service_name
         - service_component
         - project
         - namespace
         - artifacts_bucket_name
         - vigil_server_release_id
         - otlp_profiles_endpoint

   tasks:
     - name: Create vigil user
       user:
         name: "{{ vigil_server_system_user }}"
         password: '*'
         umask: 0027
         shell: /usr/sbin/nologin
         system: true

     - name: Create vigil directories
       file:
         path: "{{ vigil_app_dir }}/bin"
         owner: "root"
         group: "{{ vigil_server_system_user}}"
         mode: 0750
         state: directory

     - name: Set architecture format based on normalized naming
       set_fact:
         architecture_normalized_name: >-
           {%- if ansible_architecture == "aarch64" -%}
           arm64
           {%- else -%}
           amd64
           {%- endif -%}

     # download release index and signature
     - name: Get vigil release.json index and release.json.sig from s3
       amazon.aws.s3_object:
         bucket: "{{ artifacts_bucket_name }}"
         object: "apps/vigil/releases/{{ vigil_release_id }}/{{ item }}"
         dest: "{{ vigil_app_dir }}/{{ item }}"
         mode: get
         overwrite: different
       loop:
         - release.json
         - release.json.sig

     # verify signature against golden-ami baked in public key
     - name: Verify vigil server release index signature
       command: >
         cosign verify-blob
         --key {{ cosign_pubkey_path }}
         --signature {{ vigil_app_dir }}/release.json.sig
         --insecure-ignore-tlog
         {{ vigil_app_dir }}/release.json
       register: cosign_verify_result
       failed_when: cosign_verify_result.rc != 0
       changed_when: false

     # load release index
     - name: load release index
       set_fact:
         release_index: "{{ lookup('file', vigil_app_dir + '/release.json') | from_json }}"

     # find binary path for our architecture
     - name: Set vigil binary path from release index
       set_fact:
         vigil_binary_path: >-
           {{ release_index.components.vigil.artifacts
              | selectattr('os','equalto','linux')
              | selectattr('arch','equalto',architecture_normalized_name)
              | map(attribute='binary.path')
              | first }}

     # find sha256 sum for our architecture
     - name: Find sha256 sum for vigil binary
       set_fact:
         vigil_binary_sha256: >-
           {{ release_index.components.vigil.artifacts
              | selectattr('os','equalto','linux')
              | selectattr('arch','equalto',architecture_normalized_name)
              | map(attribute='binary.sha256')
              | first }}

     - name: Ensure release index contains an artifact for this os/arch
       fail:
         msg: "No artifact found in release.json for vigil linux/{{ architecture_normalized_name }}"
       when: vigil_binary_path | default('') == ''

     - name: Ensure release index contains an sha256 sum for this artifact
       fail:
         msg: "No sha256 sum found in release.json for vigil linux/{{ architecture_normalized_name }}"
       when: vigil_binary_sha256 | default('') == ''

     - name: Check current binary hash
       stat:
         path: "{{ vigil_app_dir }}/bin/vigil"
         checksum_algorithm: sha256
         get_checksum: yes
       register: current_binary
       ignore_errors: yes

     - name: Deploy vigil binary
       when: current_binary.stat.checksum | default('') != vigil_binary_sha256
       block:
         - name: Set binary staging directory path
           set_fact:
             staging_dir: "{{ vigil_app_dir }}/bin/.staging"

         - name: Create binary staging directory
           file:
             path: "{{ staging_dir }}"
             state: directory
             mode: "0700"

         - name: Download vigil binary to staging
           amazon.aws.s3_object:
             bucket: "{{ artifacts_bucket_name }}"
             object: "apps/vigil/releases/{{ vigil_release_id }}/{{ vigil_binary_path }}"
             dest: "{{ staging_dir }}/vigil-server"
             mode: get
             overwrite: always

         - name: Compute sha256 of downloaded binary
           stat:
             path: "{{ staging_dir }}/vigil-server"
             checksum_algorithm: sha256
             get_checksum: yes
           register: staged_binary

         - name: Verify sha256 matches release index
           fail:
             msg: >-
               SHA256 mismatch: expected {{ vigil_binary_sha256 }},
               got {{ staged_binary.stat.checksum }}
           when: staged_binary.stat.checksum != vigil_binary_sha256

         - name: Ensure binary has correct permissions
           file:
             path: "{{ staging_dir }}/vigil-server"
             mode: "0755"
             owner: root
             group: root

         - name: Move verified binary into place
           command: mv "{{ staging_dir }}/vigil-server" "{{ vigil_app_dir }}/bin/vigil-server"
           notify: restart vigil service

         - name: Clean staging directory
           file:
             path: "{{ staging_dir }}"
             state: absent

     - name: Ensure /etc/vigil directory exists
       file:
         path: /etc/vigil
         state: directory
         owner: root
         group: root
         mode: "0755"

     - name: Create vigil systemd service
       template:
         src: ../templates/etc/systemd/system/{{ vigil_server_systemd_service_name }}.service.j2
         dest: /etc/systemd/system/{{ vigil_server_systemd_service_name }}.service
         mode: 0644
       notify: restart vigil service

     - name: Enable vigil systemd service
       systemd:
         name: "{{ vigil_server_systemd_service_name }}"
         state: started
         enabled: true
         daemon_reload: true

     - name: Allow vigil traffic through firewall
       ufw:
         port: "{{ vigil_tcp_port }}"
         proto: tcp
         rule: allow
       when: ansible_distribution == 'Ubuntu'

     - name: Allow vigil admin port traffic through firewall
       ufw:
         port: "{{ vigil_admin_tcp_port }}"
         proto: tcp
         rule: allow
       when: ansible_distribution == 'Ubuntu'

     - name: Generate self-signed TLS certificates for vigil server
       when: vigil_enable_tls and vigil_tls_self_signed
       block:
         - name: Check if ssl cert already exists
           ansible.builtin.stat:
             path: /home/{{ vigil_system_user }}/conf/ssl/cert.pem
           register: vigil_cert

         - name: Generate private key for local self signed ssl cert
           community.crypto.openssl_privatekey:
             path: /home/{{ vigil_system_user }}/conf/ssl/cert.key
             owner: "{{ vigil_system_user }}"
           when: not vigil_cert.stat.exists

         - name: Generate CSR for self-signed certificate for local https listener
           community.crypto.openssl_csr_pipe:
             privatekey_path: /home/{{ vigil_system_user }}/conf/ssl/cert.key
             common_name: "{{ ansible_nodename }}"
           register: csr
           when: not vigil_cert.stat.exists

         - name: Generate self-signed certificate for local https listener
           community.crypto.x509_certificate:
             path: /home/{{ vigil_system_user }}/conf/ssl/cert.pem
             csr_content: "{{ csr.csr }}"
             privatekey_path: /home/{{ vigil_system_user }}/conf/ssl/cert.key
             owner: "{{ vigil_system_user }}"
             provider: selfsigned
           when: not vigil_cert.stat.exists
           notify: restart vigil service

     - name: Build vigil env content
       set_fact:
         vigil_env_content: |
           VIGIL_DATABASE_URL={{ vigil_database_url }}
           VIGIL_OTLP_ENDPOINT=127.0.0.1:4317
           VIGIL_PYRO_SERVER={{ otlp_profiles_endpoint }}
           VIGIL_PYRO_TENANT={{ company_name }}
           VIGIL_CLAUDE_API_KEY={{ vigil_config_llm_claude_key }}
           VIGIL_ADMIN_PORT={{ vigil_server_admin_tcp_port }}
           VIGIL_HTTP_PORT={{ vigil_server_tcp_port }}
           VIGIL_TRUSTED_PROXY_HOPS={{ vigil_server_trusted_proxy_hops }}
           VIGIL_PROMETHEUS_ENDPOINT={{ vigil_prometheus_endpoint }}
           {% if vigil_tls_enabled | default(false) %}
             VIGIL_ENABLE_TLS=true
             VIGIL_TLS_CERT_FILE={{ vigil_tls_cert_path }}
             VIGIL_TLS_KEY_FILE={{ vigil_tls_key_path }}
           {% endif %}

     - name: Write vigil environment file
       copy:
         dest: /etc/vigil/vigil-server.env
         owner: root
         group: root
         mode: "0600"
         content: "{{ vigil_env_content }}"
       no_log: true
       notify:
         - restart vigil service

     - name: Create vigil systemd service
       template:
         src: ../templates/etc/systemd/system/{{ vigil_server_systemd_service_name }}.service.j2
         dest: /etc/systemd/system/{{ vigil_server_systemd_service_name }}.service
         mode: 0644
       notify: restart vigil service

     - name: Enable vigil systemd service
       service:
         name: "{{ vigil_server_systemd_service_name }}"
         state: started
         enabled: true

     - name: Allow vigil traffic through firewall
       ufw:
         port: "{{ vigil_server_tcp_port }}"
         proto: tcp
         rule: allow
       when: ansible_distribution == 'Ubuntu'

   handlers:
     - name: restart vigil service
       systemd:
         name: "{{ vigil_server_systemd_service_name }}"
         state: restarted
         enabled: true
         daemon_reload: true