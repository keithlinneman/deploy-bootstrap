---
 - name: spire-server playbook
   hosts: all
   become: true
   vars_files:
     - ../vars/default.yml
     - ../vars/{{ ansible_os_family }}.yml

   pre_tasks:
     - name: Get instance metadata
       ec2_metadata_facts:

     - name: Print all environment vars for debugging
       debug:
         var: hostvars[inventory_hostname]
         verbosity: 2

     - name: Set facts from ssm here since they require ec2 metadata to lookup region
       set_fact:
         account_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/account/name', region=ansible_ec2_instance_identity_document_region ) }}"
         artifacts_bucket_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/artifacts/bucket/name', region=ansible_ec2_instance_identity_document_region ) }}"
         company_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/company/name', region=ansible_ec2_instance_identity_document_region ) }}"
         hosted_zone_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/dns/hosted_zone/name', region=ansible_ec2_instance_identity_document_region ) }}"
         platform_env: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/name', region=ansible_ec2_instance_identity_document_region ) }}"
         trust_materials_bucket_name: "{{ lookup('amazon.aws.aws_ssm', spire_trust_materials_bucket_param, region=ansible_ec2_instance_identity_document_region ) }}"
         spiffe_trust_domain: "{{ lookup('amazon.aws.aws_ssm', '/platform/trust/spiffe/trust_domain', region=ansible_ec2_instance_identity_document_region ) }}"
         region_short: "{{ ansible_ec2_placement_availability_zone_id.split('-')[0] }}"

     - name: Set facts from environment variables
       set_fact:
         service_name: "{{ ansible_env.SERVICENAME | default('unknown') }}"
         service_component: "{{ ansible_env.SERVICECOMPONENT | default(ansible_env.SERVICENAME | default('unknown')) }}"
         project: "{{ ansible_env.PROJECT | default('unknown') }}"
         namespace: "{{ ansible_env.NAMESPACE | default('unknown') }}"

     - name: Set base application directory
       set_fact:
         spire_app_dir: "/opt/spire-server"

     - name: Ensure required variables are defined
       fail:
         msg: "{{ item }} must be defined use -e {{ item }}=value"
       when: (lookup('vars', item, default=None)) is none
       with_items:
         - account_name
         - artifacts_bucket_name
         - company_name
         - hosted_zone_name
         - platform_env
         - trust_materials_bucket_name
         - spire_db_host
         - spire_db_port
         - spire_db_name
         - spire_db_user
         - spire_intermediate_cert_arn
         - spire_intermediate_key_arn
         - spire_intermediate_bundle_arn
         - service_name
         - service_component
         - project
         - namespace

   tasks:
     - name: Create spire user
       user:
         name: "{{ spire_server_system_user }}"
         password: '*'
         umask: 0027
         shell: /usr/sbin/nologin
         system: true

     - name: Create spire directories
       file:
         path: "{{ spire_app_dir }}/{{ item }}"
         owner: "root"
         group: "{{ spire_server_system_user }}"
         mode: 0750
         state: directory
       loop:
         - bin
         - certs
         - conf
         - conf/ssl
         - data

     # 3/13/26 - Generate privatekey and certificate for postgres client, because otherwise spires pg driver will refuse to proceed unless it can confirm a .crt doesnt exist in home directory
     - name: Check if ssl cert already exists
       ansible.builtin.stat:
         path: "{{ spire_app_dir }}/conf/ssl/cert.pem"
       register: spire_cert

     - name: Generate private key for local self signed ssl cert
       community.crypto.openssl_privatekey:
         path: "{{ spire_app_dir }}/conf/ssl/cert.key"
         owner: "{{ spire_server_system_user }}"
       when: not spire_cert.stat.exists

     - name: Generate CSR for self-signed certificate for postgres library
       community.crypto.openssl_csr_pipe:
         privatekey_path: "{{ spire_app_dir }}/conf/ssl/cert.key"
         common_name: "{{ ansible_nodename }}"
       register: csr
       when: not spire_cert.stat.exists

     - name: Generate self-signed certificate for postgres library
       community.crypto.x509_certificate:
         path: "{{ spire_app_dir }}/conf/ssl/cert.pem"
         csr_content: "{{ csr.csr }}"
         privatekey_path: "{{ spire_app_dir }}/conf/ssl/cert.key"
         owner: "{{ spire_server_system_user }}"
         provider: selfsigned
       when: not spire_cert.stat.exists         

     - name: Set architecture format based on normalized naming
       set_fact:
         architecture_normalized_name: >-
           {%- if ansible_architecture == "aarch64" -%}
           arm64
           {%- else -%}
           amd64
           {%- endif -%}

     - name: Check current binary hash
       stat:
         path: "{{ spire_app_dir }}/bin/spire-server"
         checksum_algorithm: sha256
         get_checksum: yes
       register: current_binary
       ignore_errors: yes

     - name: Deploy spire binary
       when: current_binary.stat.checksum | default('') != spire_binary_sha256
       block:
         - name: Set binary staging directory path
           set_fact:
             staging_dir: "{{ spire_app_dir }}/bin/.staging"

         - name: Create binary staging directory
           file:
             path: "{{ staging_dir }}"
             state: directory
             mode: "0700"

         - name: Get pinned spire server release from s3 artifacts bucket 
           amazon.aws.s3_object:
            bucket: "{{ artifacts_bucket_name }}"
            object: "thirdparty/spiffe/spire/v{{ spire_version }}/spire-server-{{ architecture_normalized_name }}"
            dest: "{{ staging_dir }}/spire-server"
            mode: get
            overwrite: always

         - name: Compute sha256 of downloaded binary
           stat:
             path: "{{ staging_dir }}/spire-server"
             checksum_algorithm: sha256
             get_checksum: yes
           register: staged_binary

         - name: Verify sha256 matches release index
           fail:
             msg: >-
               SHA256 mismatch: expected {{ spire_binary_sha256 }},
               got {{ staged_binary.stat.checksum }}
           when: staged_binary.stat.checksum != spire_binary_sha256

         - name: Ensure binary has correct permissions
           file:
             path: "{{ staging_dir }}/spire-server"
             mode: "0755"
             owner: root
             group: root

         - name: Move verified binary into place
           command: mv "{{ staging_dir }}/spire-server" "{{ spire_app_dir }}/bin/spire-server"
           notify: restart spire service

         - name: Clean staging directory
           file:
             path: "{{ staging_dir }}"
             state: absent

     - name: Copy spire certificate chain from s3 trust-materials bucket
       amazon.aws.s3_object:
         bucket: "{{ trust_materials_bucket_name }}"
         object: "{{ spire_trust_materials_cert_chain_path }}"
         dest: "{{ spire_app_dir }}/certs/spire-chain.pem"
         mode: get
         overwrite: different
       notify: restart spire service

     - name: Ensure certificate chain has correct permissions
       file:
         path: "{{ spire_app_dir }}/certs/spire-chain.pem"
         mode: "0644"
         owner: root
         group: "{{ spire_server_system_user }}"

     - name: Modify spire-server configuration file
       template:
         src: ../templates/spire/conf/server.conf.j2
         dest: "{{ spire_app_dir }}/conf/server.conf"
         mode: 0644
       notify: restart spire service
       when: ansible_os_family == 'Debian'

     - name: Install RDS CA bundle for postgres tls
       when: spire_db_type == "rds"
       block:
         - name: Download RDS CA bundle
           get_url:
             url: "https://truststore.pki.rds.amazonaws.com/{{ ansible_ec2_instance_identity_document_region }}/{{ ansible_ec2_instance_identity_document_region }}-bundle.pem"
             dest: /root/rds-ca-bundle.pem

         - name: Split RDS CA bundle into individual certs
           shell:
             cmd: |
               awk 'BEGIN {n=0} /-----BEGIN CERTIFICATE-----/ {n++; filename=sprintf("/usr/local/share/ca-certificates/rds-{{ ansible_ec2_instance_identity_document_region }}-%d.crt", n)} {print > filename}' /root/rds-ca-bundle.pem
             creates: /usr/local/share/ca-certificates/rds-{{ ansible_ec2_instance_identity_document_region }}-1.crt

         - name: Update system CA certificates
           command: update-ca-certificates

     - name: Create spire systemd service
       template:
         src: ../templates/etc/systemd/system/{{ spire_server_systemd_service_name }}.service.j2
         dest: /etc/systemd/system/{{ spire_server_systemd_service_name }}.service
         mode: 0644
       notify: restart spire service

     - name: Allow spire-server grpc traffic through firewall
       ufw:
         port: "{{ spire_server_grpc_port }}"
         proto: tcp
         rule: allow
       when: ansible_distribution == 'Ubuntu'

     - name: Allow spire-server metrics traffic through firewall
       ufw:
         port: "{{ spire_server_metrics_port }}"
         proto: tcp
         rule: allow
       when: ansible_distribution == 'Ubuntu'

     - name: Allow spire-server health traffic through firewall
       ufw:
         port: "{{ spire_server_health_port }}"
         proto: tcp
         rule: allow
       when: ansible_distribution == 'Ubuntu'

     # add spiffe server address to hosts file as localhost on spire-server
     # we are using nlb with preserve_client_ip.enabled which rewrites dst ip to our ip, so we end up seeing an incoming connection
     # to spire with our ip as the dstip instead of the nlb, just routing those connections to our local spire server instead
     - name: Add spire server hosts entry
       lineinfile:
         path: /etc/hosts
         line: "127.0.0.1 {{ spiffe_server_address }}"
         regexp: "{{ spiffe_server_address | regex_escape }}"
         state: present

     # flush handlers for service restart, then ensure its started after.
     # prevents starting in task -> restarting in notified handlers during bootstrap, ensures its running for idempotent runs
     - name: Flush pending handlers
       meta: flush_handlers

     - name: Enable spire systemd service
       service:
         name: "{{ spire_server_systemd_service_name }}"
         enabled: true

   handlers:
     - name: restart spire service
       systemd:
         name: "{{ spire_server_systemd_service_name }}"
         state: restarted
         enabled: true
         daemon_reload: true
