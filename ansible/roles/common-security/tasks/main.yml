- name: 6.2.3.15 | Ensure successful and unsuccessful attempts to use the chcon command are recorded | Config
  lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: -a always,exit -F path=/usr/bin/chcon -F perm=x -F auid>={{ system_uid_minimum }} -F auid!=unset -k perm_chng
    #backup: true
    backrefs: false
