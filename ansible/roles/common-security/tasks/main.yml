---
- name: Include OS variables
  include_vars: "{{ item }}"
  with_first_found:
    - "../vars/{{ ansible_distribution }}.yml"
    - "../vars/{{ ansible_os_family }}.yml"

# CIS 1 Initial Setup
# CIS 1.1 Filesystem
- name: 1.1.1.1 | Ensure cramfs kernel module is not available | blacklist
  lineinfile:
    path: /etc/modprobe.d/99-blacklist-cramfs.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^.*install cramfs.*", line: "install cramfs /bin/false" }
    - { regexp: "^.*blacklist cramfs", line: "blacklist cramfs" }

- name: 1.1.1.2 | Ensure freevxfs kernel module is not available
  lineinfile:
    path: /etc/modprobe.d/99-blacklist-frevxfs.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^.*install frevxfs.*", line: "install frevxfs /bin/false" }
    - { regexp: "^.*blacklist frevxfs", line: "blacklist frevxfs" }

- name: 1.1.1.4 | Ensure hfsplus kernel module is not available
  lineinfile:
    path: /etc/modprobe.d/99-blacklist-hfsplus.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^.*install hfsplus.*", line: "install hfsplus /bin/false" }
    - { regexp: "^.*blacklist hfsplus", line: "blacklist hfsplus" }

- name: 1.1.1.5 | Ensure jffs2 kernel module is not available
  lineinfile:
    path: /etc/modprobe.d/99-blacklist-jffs2.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^.*install jffs2.*", line: "install jffs2 /bin/false" }
    - { regexp: "^.*blacklist jffs2", line: "blacklist jffs2" }

- name: 1.1.1.6 | Ensure overlayfs kernel module is not available | blacklist
  lineinfile:
    path: /etc/modprobe.d/99-blacklist-overlayfs.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^.*install overlayfs.*", line: "install overlayfs /bin/false" }
    - { regexp: "^.*blacklist overlayfs", line: "blacklist overlayfs" }

- name: 1.1.1.8 | Ensure udf kernel module is not available
  lineinfile:
    path: /etc/modprobe.d/99-blacklist-tipc.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^.*install udf.*", line: "install udf /bin/false" }
    - { regexp: "^.*blacklist udf", line: "blacklist udf" }

- name: 1.1.1.9 | Ensure usb-storage kernel module is not available | blacklist
  lineinfile:
    path: /etc/modprobe.d/99-blacklist-usb-storage.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^.*install usb-storage.*", line: "install usb-storage /bin/false" }
    - { regexp: "^.*blacklist usb-storage", line: "blacklist usb-storage" }

# CIS 1.3 Mandatory Access Control
# check if any profiles are in unconfined mode
- name: 1.3.1.2 | Ensure AppArmor is enabled in the bootloader configuration | default grub
  lineinfile:
    path: /etc/default/grub
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: true
    create: true
  loop:
    - { regexp: '^GRUB_CMDLINE_LINUX="((?:(?!apparmor=1).)*?)"$', line: 'GRUB_CMDLINE_LINUX="\1 apparmor=1"' }
    - { regexp: '^GRUB_CMDLINE_LINUX="((?:(?!security=apparmor).)*?)"$', line: 'GRUB_CMDLINE_LINUX="\1 security=apparmor"' }
  notify: Update grub
  when: ansible_distribution == 'Ubuntu'

- name: 1.3.1.3 | Ensure all AppArmor Profiles are in enforce or complain mode | Live
  shell:
    cmd: apparmor_status --filter.mode=unconfined --show=profiles --quiet | grep '^\s' | sed 's/vscode/code/g;s/^\s*//g;s/\s/_/g'
  register: apparmor_unconfined_profiles
  changed_when: false
# put any profiles in unconfined mode into complain mode
- name: 1.3.1.3 | Ensure all AppArmor Profiles are in enforce or complain mode | Action
  shell:
    cmd: apparmor_status --filter.mode=unconfined --show=profiles --quiet | grep '^\s' | sed 's/vscode/code/g;s/^\s*//g;s/\s/_/g' | xargs aa-complain
  when: apparmor_unconfined_profiles.stdout != "" and ansible_distribution == 'Ubuntu'

## CIS 1.5 Configure Additional Process Hardening
- name: 1.5.1 | Ensure address space layout randomization (ASLR) is enabled | sysctl_configured
  lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: '^kernel.randomize_va_space=.*'
    line: 'kernel.randomize_va_space=2'
    #backup: true
    backrefs: false
    create: true
  notify: Reload sysctl values

- name: 1.5.3 | Ensure core dumps are restricted | security/limits.conf
  lineinfile:
    path: /etc/security/limits.d/99-phxi.conf
    line: '* hard core 0'
    #backup: true
    backrefs: false
    create: true

- name: 1.5.3 | Ensure core dumps are restricted | sysctl conf
  lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: '^fs.suid_dumpable = .*'
    line: 'fs.suid_dumpable = 0'
    #backup: true
    backrefs: false
    create: true
  notify: Reload sysctl values

- name: 1.5.3 | Ensure core dumps are restricted | coredump.conf
  lineinfile:
    path: /etc/systemd/coredump.conf
    line: "{{ item.line }}"
    regexp: "{{ item.regexp }}"
    backrefs: false
    create: true
    #backup: true
  loop:
    - { regexp: "^.*Storage=.*", line: "Storage=none" }
    - { regexp: "^.*ProcessSizeMax=.*", line: "ProcessSizeMax=0" }

- name: 1.5.5 | Ensure Automatic Error Reporting is not enabled | package
  package: name=apport state=absent
  when: ansible_distribution == 'Ubuntu'

- name: 1.5.5 | Ensure Automatic Error Reporting is not enabled | config
  lineinfile:
    path: /etc/default/apport
    regexp: '^enabled=.*'
    line: 'enabled=0'
    #backup: true
    backrefs: true
    create: true
  when: ansible_distribution == 'Ubuntu'

## CIS 1.6 Configure Command Line Warning Banners
- name: 1.6.1 | Ensure message of the day is configured properly | stop dynamic load
  lineinfile:
    path: /etc/pam.d/sshd
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: '^.*session\s*optional\s*pam_motd.so\s*motd=/run/motd.dynamic.*', line: '#session    optional     pam_motd.so motd=/run/motd.dynamic' }
    #- { regexp: '^.*session\s*optional\s*pam_motd.so\s*noupdate', line: '#session    optional     pam_motd.so noupdate' }

- name: 1.6.1 | Ensure message of the day is configured properly | motd file
  file:
    path: /etc/motd
    state: touch
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: 0644

- name: 1.6.2 | Ensure local login warning banner is configured properly
  file:
    path: "{{ item.path }}"
    state: touch
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: 0644
  loop:
    - { path: "/etc/issue" }
    - { path: "/etc/issue.net" }

- name: 1.6.2 | Ensure local login warning banner is configured properly
  copy:
    src: ../files/etc/update-motd.d/00-header
    dest: /etc/update-motd.d/00-header
    #backup: true
  when: ansible_distribution == 'Ubuntu'

# CIS 2 Services
## CIS 2.1 Configure Server Services
- name: 2.1.13 | Ensure rsync services are not in use | pkg removed
  package: name=rsync state=absent

## CIS 2.2 Configure Client Services
- name: 2.2.4 | Ensure telnet client is not installed | inetutils-telnet
  package: name=inetutils-telnet state=absent

- name: 2.2.6 | Ensure ftp client is not installed
  package:
    name:
      - tnftp
      - ftp
    state: absent

## CIS 2.3 Configure Time Synchronization
- name: 2.3.3.2 | Ensure chrony is running as user _chrony
  lineinfile:
    path: /etc/chrony/chrony.conf
    regexp: "^user .*"
    line: "user _chrony"
    #backup: true
    backrefs: false
    create: true
  when: ansible_os_family == 'Debian'

## CIS 2.4 Job Schedulers
- name: 2.4.1.2 | Ensure permissions on /etc/crontab are configured
  file:
    path: /etc/crontab
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: 0600

- name: 2.4.1.3 | Ensure permissions on /etc/cron.hourly are configured
  file:
    path: /etc/cron.hourly
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: 0700

- name: 2.4.1.4 | Ensure permissions on /etc/cron.daily are configured
  file:
    path: /etc/cron.daily
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: 0700

- name: 2.4.1.5 | Ensure permissions on /etc/cron.weekly are configured
  file:
    path: /etc/cron.weekly
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: 0700

- name: 2.4.1.6 | Ensure permissions on /etc/cron.monthly are configured
  file:
    path: /etc/cron.monthly
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: 0700

- name: 2.4.1.7 | Ensure permissions on /etc/cron.d are configured
  file:
    path: /etc/cron.d
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: 0700
  when: ansible_os_family == 'Debian'

#  - name: 2.4.1.8 | Ensure cron is restricted to authorized users | cron.allow
#    group:
#      name: cronallowed
#      state: present

- name: 2.4.1.8 | Ensure cron is restricted to authorized users | cron.allow
  file:
    path: /etc/cron.allow
    state: touch
    modification_time: preserve
    access_time: preserve
    owner: root
    group: crontab
    mode: 0640

- name: 2.4.2.1 | Ensure at is restricted to authorized users
  file:
    path: /etc/at.allow
    state: touch
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: 0640

# CIS 3 Network
## CIS 3.1 Configure Network Devices
- name: 3.1.1 | Ensure IPv6 status is identified | via grub boot
  lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX="((?:(?!ipv6.disable=1).)*?)"$'
    line: 'GRUB_CMDLINE_LINUX="\1 ipv6.disable=1"'
    #backup: true
    backrefs: true
    create: true
  notify: Update grub

## CIS 3.2 Configure Network Kernel Modules
- name: 3.2.1 | Ensure dccp kernel module is not available | DCCP config
  lineinfile:
    path: /etc/modprobe.d/99-blacklist-tipc.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^.*install dccp.*", line: "install dccp /bin/false" }
    - { regexp: "^.*blacklist dccp", line: "blacklist dccp" }

- name: 3.2.2 | Ensure tipc kernel module is not available | tipc config
  lineinfile:
    path: /etc/modprobe.d/99-blacklist-tipc.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^.*install tipc.*", line: "install tipc /bin/false" }
    - { regexp: "^.*blacklist tipc", line: "blacklist tipc" }

- name: 3.2.3 | Ensure rds kernel module is not available | rds config
  lineinfile:
    path: /etc/modprobe.d/99-blacklist-tipc.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^.*install rds.*", line: "install rds /bin/false" }
    - { regexp: "^.*blacklist rds", line: "blacklist rds" }

- name: 3.2.4 | Ensure sctp kernel module is not available | sctp config
  lineinfile:
    path: /etc/modprobe.d/99-blacklist-sctp.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^.*install sctp.*", line: "install sctp /bin/false" }
    - { regexp: "^.*blacklist sctp", line: "blacklist sctp" }

## CIS 3.3 Configure Network Kernel Parameters
- name: 3.3.1 | Ensure IP forwarding is disabled | IPv4 config
  lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: '^net.ipv4.ip_forward = .*'
    line: 'net.ipv4.ip_forward = 0'
    #backup: true
    backrefs: false
    create: true
  notify: Reload sysctl values

- name: 3.3.2 | Ensure packet redirect sending is disabled | default send_redirect config
  lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: '^net.ipv4.conf.default.send_redirects=.*', line: 'net.ipv4.conf.default.send_redirects=0' }
    - { regexp: '^net.ipv4.conf.all.send_redirects=.*', line: 'net.ipv4.conf.all.send_redirects=0' }
  notify: Reload sysctl values

- name: 3.3.3 | Ensure bogus ICMP responses are ignored | ignore bogus icmp conf
  lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: '^net.ipv4.icmp_ignore_bogus_error_responses = .*'
    line: 'net.ipv4.icmp_ignore_bogus_error_responses = 1'
    #backup: true
    backrefs: false
    create: true
  notify: Reload sysctl values

# creating empty conf dir because some compliance checks use error exit code when searching multiple folders otherwise
- name: Create /etc/systemd/journald.conf.d/ directory
  file:
    path: /etc/systemd/journald.conf.d/
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: 0755
    state: directory
- name: Create empty /etc/systemd/journald.conf.d/99-empty.conf file
  file:
    path: /etc/systemd/journald.conf.d/99-empty.conf
    state: touch
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: 0644

- name: 3.3.4 | Ensure broadcast ICMP requests are ignored | ipv4 ignore broadcast icmp conf
  lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: '^net.ipv4.icmp_echo_ignore_broadcasts = .*'
    line: 'net.ipv4.icmp_echo_ignore_broadcasts = 1'
    #backup: true
    backrefs: false
    create: true
  notify: Reload sysctl values

- name: 3.3.5 | Ensure ICMP redirects are not accepted | ipv4 all icmp redirects conf
  lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: '^.*net.ipv4.conf.all.accept_redirects = .*', line: 'net.ipv4.conf.all.accept_redirects = 0' }
    - { regexp: '^.*net.ipv4.conf.default.accept_redirects = .*', line: 'net.ipv4.conf.default.accept_redirects = 0' }
  notify: Reload sysctl values

- name: 3.3.6 | Ensure secure ICMP redirects are not accepted | ipv4 all sec redirects conf
  lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: '^net.ipv4.conf.all.secure_redirects = .*', line: 'net.ipv4.conf.all.secure_redirects = 0' }
    - { regexp: '^net.ipv4.conf.default.secure_redirects = .*', line: 'net.ipv4.conf.default.secure_redirects = 0' }
  notify: Reload sysctl values

- name: 3.3.7 | Ensure Reverse Path Filtering is enabled | ipv4 all rp_filter conf
  lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: ^net.ipv4.conf.all.rp_filter = .*, line: net.ipv4.conf.all.rp_filter = 1 }
    - { regexp: ^net.ipv4.conf.default.rp_filter = .*, line: net.ipv4.conf.default.rp_filter = 1}
  notify: Reload sysctl values

- name: 3.3.8 | Ensure source routed packets are not accepted
  lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^net.ipv4.conf.default.accept_source_route = .*", line: "net.ipv4.conf.default.accept_source_route = 0" }
    - { regexp: "^net.ipv4.conf.all.accept_source_route = .*", line: "net.ipv4.conf.all.accept_source_route = 0" }
  notify: Reload sysctl values

- name: 3.3.9 | Ensure suspicious packets are logged | ipv4 all martians conf
  lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: ^net.ipv4.conf.all.log_martians = .*, line: net.ipv4.conf.all.log_martians = 1 }
    - { regexp: ^net.ipv4.conf.default.log_martians = .*, line: net.ipv4.conf.default.log_martians = 1}
  notify: Reload sysctl values

- name: 3.3.9 | Ensure suspicious packets are logged | disable ufw sysctl conf
  lineinfile:
    path: /etc/default/ufw
    regexp: "^IPT_SYSCTL=/etc/ufw/sysctl.conf"
    line: "#IPT_SYSCTL=/etc/ufw/sysctl.conf"
    #backup: true
    backrefs: false
  notify: Reload sysctl values
  when: ansible_distribution == 'Ubuntu'

- name: 3.3.10 | Ensure TCP SYN Cookies is enabled | ipv4 syncookies conf
  lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: ^net.ipv4.tcp_syncookies = .*
    line: net.ipv4.tcp_syncookies = 1
    #backup: true
    backrefs: false
    create: true
  notify: Reload sysctl values

- name: 3.3.10 | Ensure TCP SYN Cookies is enabled | ipv4 syncookies conf
  lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: ^net.ipv4.tcp_syncookies = .*
    line: net.ipv4.tcp_syncookies = 1
    #backup: true
    backrefs: false
    create: true
  notify: Reload sysctl values

# CIS 4 Host Based Firewall
## CIS 4.2 Configure ufw
- name: 4.2.4 | Ensure ufw loopback traffic is configured | allow lo
  ufw:
    state: "{{ item.state }}"
    rule: "{{ item.rule }}"
    interface: "{{ item.interface }}"
    direction: "{{ item.direction }}"
  loop:
    - { state: "enabled", rule: "allow", interface: "lo", direction: "in" }
    - { state: "enabled", rule: "allow", interface: "lo", direction: "out" }
  when: ansible_distribution == 'Ubuntu'

- name: 4.2.4 | Ensure ufw loopback traffic is configured | deny 127.0.0.1
  ufw:
    state: enabled
    rule: deny
    direction: in
    src: 127.0.0.0/8
  when: ansible_distribution == 'Ubuntu'

- name: 4.2.5 | Ensure ufw outbound connections are configured
  ufw:
    direction: out
    state: enabled
    rule: allow
  when: ansible_distribution == 'Ubuntu'

# TODO: FIXME: revisit this later to restrict further
- name: Allow all inbound ssh from 10.x non-routable IP addresses
  ufw:
    state: "{{ item.state }}"
    rule: "{{ item.rule }}"
    direction: "{{ item.direction }}"
    proto: "{{ item.proto }}"
    to_port: "{{ item.to_port }}"
    from_ip: "{{ item.from_ip }}"
  loop:
    - { state: "enabled", rule: "allow", direction: "in", proto: "tcp", to_port: "22", from_ip: "10.0.0.0/8" }
    #- { state: "enabled", rule: "allow", direction: "in", proto: "tcp", to_port: "22", from_ip: "172.16.0.0/12" }
  when: ansible_distribution == 'Ubuntu'

- name: 4.2.7 | Ensure ufw default deny firewall policy
  ufw:
    state: "{{ item.state }}"
    default: "{{ item.default }}"
    direction: "{{ item.direction }}"
  loop:
    - { state: "enabled", default: "deny", direction: "incoming" }
    - { state: "enabled", default: "deny", direction: "outgoing" }
  when: ansible_distribution == 'Ubuntu'

# CIS 5 Access Control
## CIS 5.1 Configure SSH Server
- name: 5.1.1 | Ensure permissions on /etc/ssh/sshd_config are configured
  file:
    path: /etc/ssh/sshd_config
    state: touch
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: 0600

- name: 5.1.4 | Ensure SSH access is configured | AllowGroups
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^.*AllowGroups .*'
    line: 'AllowGroups adm'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service sshd

# not displaying an sshd banner before logino
- name: 5.1.5 | Ensure sshd banner is configured | sshd_config
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^.*Banner .*'
    line: '#Banner /etc/issue.net'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service sshd

- name: 5.1.6 | Ensure only strong Ciphers are used
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^.*Ciphers .*'
    line: 'Ciphers aes256-ctr,aes192-ctr,aes128-ctr'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service sshd

- name: 5.1.7 | Ensure sshd ClientAliveInterval and ClientAliveCountMax are configured
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^ClientAliveInterval .*", line: "ClientAliveInterval 300" }
    - { regexp: "^ClientAliveCountMax .*", line: "ClientAliveCountMax 3" }
  notify: Restart service sshd

- name: 5.1.8 | Ensure sshd DisableForwarding is enabled
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^.*DisableForwarding .*'
    line: 'DisableForwarding yes'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service sshd

- name: 5.1.10 | Ensure SSH HostbasedAuthentication is disabled
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^.*HostbasedAuthentication .*'
    line: 'HostbasedAuthentication no'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service sshd

- name: 5.1.11 | Ensure sshd IgnoreRhosts is enabled
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^.*IgnoreRhosts .*'
    line: 'IgnoreRhosts yes'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service sshd

- name: 5.1.12 | Ensure sshd Kex algorithms is configured
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^.*KexAlgorithms .*'
    line: 'KexAlgorithms {{ service_ssh_config_kex_algorithms }}'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service sshd

- name: 5.1.13 | Ensure sshd LoginGraceTime is configured
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^.*LoginGraceTime .*'
    line: 'LoginGraceTime 60'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service sshd

- name: 5.1.15 | Ensure only strong MACs are used
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^.*MACs .*'
    line: 'MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service sshd

- name: 5.1.16 | Ensure sshd MaxAuthTries is configured
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^.*MaxAuthTries .*'
    line: 'MaxAuthTries 3'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service sshd

- name: 5.1.17 | Ensure SSH MaxSessions is limited
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^.*MaxSessions .*'
    line: 'MaxSessions 10'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service sshd

- name: 5.1.18 | Ensure SSH MaxStartups is configured
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^.*MaxStartups .*'
    line: 'MaxStartups 10:30:60'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service sshd

- name: 5.1.19 | Ensure SSH PermitEmptyPasswords is configured
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^.*PermitEmptyPasswords .*'
    line: 'PermitEmptyPasswords no'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service sshd

- name: 5.1.20 | Ensure SSH PermitRootLogin is configured
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^.*PermitRootLogin .*'
    line: 'PermitRootLogin no'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service sshd

- name: 5.1.21 | Ensure SSH PermitUserEnvironment is disabled
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^.*PermitUserEnvironment .*'
    line: 'PermitUserEnvironment no'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service sshd

## CIS 5.2 Configure Privilege Escalation

# 5.2.4 | Ensure users must provide password for privilege escalation
# skipping for now. default aws admin account has no password and we dont have a solution for setting/storing/changing admin ssh account passwords across entire infrastructure yet

- name: 5.2.6 | Ensure sudo authentication timeout is configured correctly
  lineinfile:
    path: /etc/sudoers.d/99-phxi.conf
    line: Defaults timestamp_timeout=15
    #backup: true
    backrefs: false
    create: true

- name: 5.2.7 | Ensure access to the su command is restricted
  lineinfile:
    path: /etc/pam.d/su
    regexp: ^.*auth required pam_wheel.so use_uid group={{ system_su_group }}
    line: auth required pam_wheel.so use_uid group={{ system_su_group }}
    insertafter: ^auth\s*sufficient\s*pam_rootok.so
    #backup: true
    create: true

## CIS 5.3 Pluggable Authentication Modules
- name: Install pam modules for pwquality checks
  package:
    name: "{{ pam_pwquality_package_name }}"
    state: present
  when: ansible_os_family == 'Debian'

# creating empty conf because audit checks except exit code 0 and grep exits with code 2 when they check non-existant directory/file
#  - stat:
#      path: /etc/security/pwquality.conf.d/99-empty.conf
#    register: pwqualityconfdir
- name: Create /etc/security/pwquality.conf.d directory
  file:
    path: /etc/security/pwquality.conf.d
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: 0755
    state: directory
#    when: pwqualityconfdir.stat.exists is defined and not pwqualityconfdir.stat.exists

- name: Create empty pwquality.conf.d/99-empty.conf file
  file:
    path: /etc/security/pwquality.conf.d/99-empty.conf
    state: touch
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: 0644

- name: (Debian) 5.3.2.2 | Ensure pam_faillock module is enabled | pam.d/common-auth
  lineinfile:
    path: /etc/pam.d/common-auth
    line: "auth    required                        pam_faillock.so preauth"
    insertbefore: '^auth\s*[success=1 default=ignore]\s*pam_unix.so.*'
    #backup: true
  when: ansible_os_family == 'Debian'

- name: (Debian) 5.3.2.2 | Ensure pam_faillock module is enabled | pam.d/common-auth
  lineinfile:
    path: /etc/pam.d/common-auth
    line: "auth    [default=die]                   pam_faillock.so authfail"
    insertafter: '^auth\s*[success=1 default=ignore]\s*pam_unix.so.*'
    #backup: true
  when: ansible_os_family == 'Debian'

- name: (Debian) 5.3.2.2 | Ensure pam_faillock module is enabled | pam.d/common-auth
  lineinfile:
    path: /etc/pam.d/common-auth
    line: "auth    sufficient                      pam_faillock.so authsucc"
    insertafter: 'auth\s*[default=die]\s*pam_faillock.so\s*authfail'
    #backup: true
  when: ansible_os_family == 'Debian'

- name: (Debian) 5.3.2.2 | Ensure pam_faillock module is enabled | pam.d/common-account
  lineinfile:
    path: /etc/pam.d/common-account
    line: "account  required      pam_faillock.so"
    #backup: true
  when: ansible_os_family == 'Debian'

- name: (Amazon) 5.3.2.2 | Ensure pam_faillock module is enabled | pam.d/system-auth
  lineinfile:
    path: /etc/pam.d/system-auth
    line: "auth        required      pam_faillock.so preauth silent"
    insertafter: 'auth\s*required\s*pam_env.so'
    #backup: true
  when: ansible_distribution == 'Amazon'

- name: (Amazon) 5.3.2.2 | Ensure pam_faillock module is enabled | pam.d/system-auth
  lineinfile:
    path: /etc/pam.d/system-auth
    line: "auth        [default=die] pam_faillock.so authfail"
    insertafter: 'auth\s*required\s*pam_faillock.so\s*preauth\s*silent'
    #backup: true
  when: ansible_distribution == 'Amazon'

- name: (Amazon) 5.3.2.2 | Ensure pam_faillock module is enabled | pam.d/system-auth
  lineinfile:
    path: /etc/pam.d/system-auth
    line: "account     required      pam_faillock.so"
    insertafter: 'account\s*required\s*pam_unix.so'
    #backup: true
  when: ansible_distribution == 'Amazon'

- name: (Amazon) 5.3.2.2 | Ensure pam_faillock module is enabled | pam.d/password-auth
  lineinfile:
    path: /etc/pam.d/password-auth
    line: "auth        required      pam_faillock.so preauth silent"
    insertafter: 'auth\s*required\s*pam_env.so'
    #backup: true
  when: ansible_distribution == 'Amazon'

- name: (Amazon) 5.3.2.2 | Ensure pam_faillock module is enabled | pam.d/password-auth
  lineinfile:
    path: /etc/pam.d/password-auth
    line: "auth        [default=die] pam_faillock.so authfail"
    insertafter: 'auth\s*required\s*pam_faillock.so\s*preauth\s*silent'
    #backup: true
  when: ansible_distribution == 'Amazon'

- name: (Amazon) 5.3.2.2 | Ensure pam_faillock module is enabled | pam.d/password-auth
  lineinfile:
    path: /etc/pam.d/password-auth
    line: "account     required      pam_faillock.so"
    insertafter: 'account\s*required\s*pam_unix.so'
    #backup: true
  when: ansible_distribution == 'Amazon'

- name: (Debian) 5.3.2.2 | Ensure pam_faillock module is enabled | pam.d/cron exclusion
  lineinfile:
    path: /etc/pam.d/cron
    line: "auth sufficient pam_rootok.so"
    insertbefore: '^@include\s*common-auth.*'
    #backup: true
  when: ansible_os_family == 'Debian'

- name: 5.3.3.1.1 | Ensure password failed attempts lockout is configured
  lineinfile:
    path: /etc/security/faillock.conf
    line: "{{ item.line }}"
    regexp: "{{ item.regexp }}"
    backrefs: false
    create: true
    #backup: true
  loop:
    - { regexp: "^.*deny = *", line: "deny = 5" }
    - { regexp: "^.*root_unlock_time = ", line: "root_unlock_time = 900" }
    - { regexp: "^.*even_deny_root", line: "even_deny_root" }

- name: 5.3.3.1.2 | Ensure password unlock time is configured
  lineinfile:
    path: /etc/security/faillock.conf
    line: "{{ item.line }}"
    regexp: "{{ item.regexp }}"
    backrefs: false
    create: true
    #backup: true
  loop:
    - { regexp: "^unlock_time = *", line: "unlock_time = 900" }

# also covers 5.3.3.3.2 | Ensure password history is enforced for the root user | common-password
- name: 5.3.3.3.1 | Ensure password history remember is configured | common-password
  lineinfile:
    path: /etc/pam.d/common-password
    line: password  required      pam_pwhistory.so remember={{ password_history_remember }} enforce_for_root use_authtok
    insertbefore: ^password\s.*\spam_unix.so\s.*
    #backup: true
    state: present
  when: ansible_os_family == 'Debian'

- name: 5.3.3.3.1 | Ensure password history remember is configured | pwhistory.conf
  lineinfile:
    path: /etc/security/pwhistory.conf
    line: "{{ item.line }}"
    regexp: "{{ item.regexp }}"
    backrefs: false
    create: true
    #backup: true
  loop:
    - { regexp: "^.*enforce_for_root.*", line: "enforce_for_root" }
    - { regexp: "^.*remember = .*", line: "remember = {{ password_history_remember }}" }
    - { regexp: "^.*retry = .*", line: "retry = 1" }
    - { regexp: "^.*file = .*", line: "file = /etc/security/opasswd" }
  when: ansible_os_family == 'Debian'

- name: (Amazon) 5.3.3.3.1 | Ensure password history remember is configured | system-auth
  lineinfile:
    path: /etc/pam.d/system-auth
    line: password    required      pam_pwhistory.so remember={{ password_history_remember }} enforce_for_root use_authtok retry=1 file=/etc/security/opasswd
    insertbefore: ^password\s.*\spam_unix.so\s.*
    #backup: true
    state: present
  when: ansible_distribution == 'Amazon'

- name: (Amazon) 5.3.3.3.1 | Ensure password history remember is configured | password-auth
  lineinfile:
    path: /etc/pam.d/password-auth
    line: password    required      pam_pwhistory.so remember={{ password_history_remember }} enforce_for_root use_authtok retry=1 file=/etc/security/opasswd
    insertbefore: ^password\s.*\spam_unix.so\s.*
    #backup: true
    state: present
  when: ansible_distribution == 'Amazon'

- name: 5.3.3.2.1 | Ensure password number of changed characters is configured
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^.*difok = .*'
    line: 'difok = {{ password_quality_minimum_changed_characters }}'
    #backup: true
    backrefs: false
    create: true

- name: 5.3.3.2.1 | Ensure password number of changed characters is configured
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^.*difok = .*'
    line: 'difok = {{ password_quality_minimum_changed_characters }}'
    #backup: true
    backrefs: false
    create: true

- name: 5.3.3.2.2 | Ensure minimum password length is configured
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^.*minlen = .*'
    line: 'minlen = {{ password_quality_minimum_length }}'
    #backup: true
    backrefs: false
    create: true

- name: 5.3.3.2.3 | Ensure password complexity is configured
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^.*minclass = .*", line: "minclass = 3" }
    - { regexp: "^.*ocredit = .*", line: "ocredit = -1" }
    - { regexp: "^.*dcredit = .*", line: "dcredit = -1" }
    - { regexp: "^.*lcredit = .*", line: "lcredit = -1" }
    - { regexp: "^.*ucredit = .*", line: "ucredit = -1" }

- name: 5.3.3.2.4 | Ensure password same consecutive characters is configured
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^.*maxrepeat = .*'
    line: 'maxrepeat = {{ password_quality_character_max_repeat }}'
    #backup: true
    backrefs: false
    create: true

- name: 5.3.3.2.5 | Ensure password maximum sequential characters is configured
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^.*maxsequence = .*'
    line: 'maxsequence = {{ password_quality_character_max_sequence }}'
    #backup: true
    backrefs: false
    create: true

- name: 5.3.3.2.6 | Ensure passwor5d dictionary check is enabled
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^.*dictcheck = .*'
    line: 'dictcheck = 1'
    #backup: true
    backrefs: false
    create: true

- name: 5.3.3.2.7 | Ensure password quality checking is enforced
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^.*enforcing = .*'
    line: 'enforcing = 1'
    #backup: true
    backrefs: false
    create: true

- name: 5.3.3.2.8 | Ensure password quality is enforced for the root user
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^.*enforce_for_root = .*'
    line: 'enforce_for_root = 1'
    #backup: true
    backrefs: false
    create: true

- name: 5.3.3.4.1 | Ensure pam_unix does not include nullok
  replace:
    path: "{{ item.path }}"
    regexp: '\snullok'
    replace: ''
    #backup: true
  loop:
    - { path: /etc/pam.d/common-auth }
    - { path: /usr/share/pam-configs/unix }
  when: ansible_os_family == 'Debian'

- name: (Amazon) 5.3.3.4.1 | Ensure pam_unix does not include nullok
  replace:
    path: "{{ item.path }}"
    regexp: '\snullok'
    replace: ''
    #backup: true
  loop:
    - { path: /etc/pam.d/system-auth }
    - { path: /etc/pam.d/password-auth }
  when: ansible_distribution == 'Amazon'

#  - name: 5.3.3.4.1 | Ensure pam_unix does not include nullok
#    replace:
#      path: /etc/pam.d/common-auth
#      regexp: '\snullok'
#      replace: ''
#      #backup: true

## CIS 5.4 User Accounts and Environment
- name: 5.4.1.1 | Ensure password expiration is 365 days or less
  replace:
    path: /etc/login.defs
    regexp: '^PASS_MAX_DAYS.*'
    replace: "PASS_MAX_DAYS {{ password_age_max_days }}"

- name: 5.4.1.1 | Ensure password expiration is 365 days or less | /etc/shadow
  shell:
    cmd: cat /etc/shadow | awk -F ':' -v 'OFS=:' '{gsub(".*","{{ password_age_max_days }}",$5)}1' > /etc/shadow.new && mv /etc/shadow.new /etc/shadow && chmod 640 /etc/shadow && chown root:{{ system_passwd_group }} /etc/shadow
  changed_when: false

- name: 5.4.1.2 | Ensure minimum password age is configured
  replace:
    path: /etc/login.defs
    regexp: '^PASS_MIN_DAYS.*'
    replace: "PASS_MIN_DAYS {{ password_age_min_days }}"

- name: 5.4.1.2 | Ensure minimum password age is configured | /etc/shadow
  shell:
    cmd: cat /etc/shadow | awk -F ':' -v 'OFS=:' '{gsub(".*","{{ password_age_min_days }}",$4)}1' > /etc/shadow.new && mv /etc/shadow.new /etc/shadow && chmod 640 /etc/shadow && chown root:{{ system_passwd_group }} /etc/shadow
  changed_when: false

- name: 5.4.1.3 | Ensure password expiration warning days is configured
  replace:
    path: /etc/login.defs
    regexp: '^PASS_WARN_AGE.*'
    replace: "PASS_WARN_AGE {{ password_expiration_warn_days }}"

- name: 5.4.1.5 | Ensure inactive password lock is configured | Config
  lineinfile:
    path: /etc/default/useradd
    regexp: '^.*INACTIVE=.*'
    line: 'INACTIVE={{ password_expired_days_disabled_account }}'
    #backup: true
    backrefs: false
    create: true

- name: 5.4.1.5 | Ensure inactive password lock is configured | shadow
  shell:
    cmd: cat /etc/shadow | awk -F ':' -v 'OFS=:' '{gsub(".*","{{ password_expired_days_disabled_account }}",$7)}1' > /etc/shadow.new && mv /etc/shadow.new /etc/shadow && chmod 640 /etc/shadow && chown root:{{ system_passwd_group }} /etc/shadow
  changed_when: false
  when: ansible_os_family == 'Debian'

# 5.4.2.4 | Ensure root password is set
# ubuntu by default doesnt set a root password or allow the account - setting it exposes additional attack surface

- name: 5.4.2.6 | Ensure root user umask is configured
  lineinfile:
    path: /root/.bash_profile
    regexp: '^.*umask.*'
    line: 'umask {{ system_filesystem_umask_root }}'
    create: true

# 12/20/24 - adding since CIS benchmarks use grep on multiple files/paths which returns error code if any files/paths dont exist even if it finds pattern match in existing files/paths
- name: 5.4.2.6 | Ensure root user umask is configured | audit only
  file:
    path: /root/bashrc
    state: touch
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: 0600

- name: 5.4.3.3 | Ensure default user umask is configured
  replace:
    path: /etc/login.defs
    regexp: '^UMASK.*'
    replace: "UMASK {{ system_filesystem_umask_default }}"

# CIS 6 Logging and Auditing
## CIS 6.1 System Logging
- name: 6.1.1.3 | Ensure journald log file rotation is configured
  lineinfile:
    path: /etc/systemd/journald.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^.*SystemMaxUse=.*", line: "SystemMaxUse={{ system_logs_size_max }}" }
    - { regexp: "^.*SystemKeepFree=.*", line: "SystemKeepFree=500M" }
    - { regexp: "^.*RuntimeMaxUse=.*", line: "RuntimeMaxUse=200M" }
    - { regexp: "^.*RuntimeKeepFree=.*", line: "RuntimeKeepFree=512M" }
    - { regexp: "^.*MaxFileSec=.*", line: "MaxFileSec=1month" }

- name: 6.1.2.1.1 | Ensure systemd-journal-remote is installed
  package:
    name: systemd-journal-remote
    state: present

- name: 6.1.2.1.4 | Ensure systemd-journal-remote service is not in use
  service:
    name: systemd-journal-remote
    state: stopped
    enabled: false

- name: 6.1.2.1.4 | Ensure systemd-journal-remote service is not in use | socket masked
  systemd_service:
    name: systemd-journal-remote.socket
    state: stopped
    enabled: false
    masked: true

- name: 6.1.2.2 | Ensure journald ForwardToSyslog is disabled
  replace:
    path: /etc/systemd/journald.conf
    regexp: '^#ForwardToSyslog=.*'
    replace: 'ForwardToSyslog=no'
  notify: Restart systemd-journald service

- name: (Debian) 6.1.2.2 | Ensure journald ForwardToSyslog is disabled
  replace:
    path: /usr/lib/systemd/journald.conf.d/syslog.conf
    regexp: '^.*ForwardToSyslog=.*'
    replace: 'ForwardToSyslog=no'
  when: ansible_os_family == 'Debian'
  notify: Restart systemd-journald service

- name: (Debian) 6.1.2.3 | Ensure journald is configured to compress large log files
  replace:
    path: /etc/systemd/journald.conf
    regexp: '^.*Compress=.*'
    replace: 'Compress=yes'
  when: ansible_os_family == 'Debian'
  notify: Restart systemd-journald service

- name: (Debian) 6.1.2.4 | Ensure journald Storage is configured
  replace:
    path: /etc/systemd/journald.conf
    regexp: '^.*Storage=.*'
    replace: 'Storage=persistent'
  when: ansible_os_family == 'Debian'
  notify: Restart systemd-journald service

## CIS 6.2 System Auditing
- name: 6.2.1.1 | Ensure auditd is installed
  package:
    name: "{{ item }}"
    state: present
  loop:
    - "{{ auditd_package_name }}"
    - audispd-plugins

- name: 6.2.1.3 | Ensure auditing for processes that start prior to auditd is enabled | bootloader file
  lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX="((?:(?!audit=1).)*?)"$'
    line: 'GRUB_CMDLINE_LINUX="\1 audit=1"'
    #backup: true
    backrefs: true
    create: true
  notify: Update grub

- name: 6.2.1.4 | Ensure audit_backlog_limit is sufficient | bootloader file
  lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX="((?:(?!audit_backlog_limit=8192).)*?)"$'
    line: 'GRUB_CMDLINE_LINUX="\1 audit_backlog_limit=8192"'
    #backup: true
    backrefs: true
    create: true
  notify: Update grub

# 6.2.2.2 | Ensure audit logs are not automatically deleted
# logs are forwarded and retained

- name: 6.2.2.1 | Ensure audit log storage size is configured
  lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^max_log_file = .*'
    line: 'max_log_file = {{ service_audit_logs_max_filesize }}'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service auditd

- name: 6.2.2.4 | Ensure system warns when audit logs are low on space
  lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^admin_space_left_action = .*'
    line: 'admin_space_left_action = email'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service auditd

- name: 6.2.2.4 | Ensure system warns when audit logs are low on space
  lineinfile:
    path: /etc/audit/auditd.conf
    regexp: '^space_left_action = .*'
    line: 'space_left_action = email'
    #backup: true
    backrefs: false
    create: true
  notify: Restart service auditd

- name: 6.2.3.1 | Ensure changes to system administration scope (sudoers) is collected | Config
  lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { line: "-w /etc/sudoers -p wa -k scope" }
    - { line: "-w /etc/sudoers.d/ -p wa -k scope" }
  notify: Regenerate auditd rules

- name: 6.2.3.2 | Ensure actions as another user are always logged | Config
  lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { line: "-a always,exit -F arch=b64 -C euid!=uid -F auid!=unset -S execve -k user_emulation" }
    - { line: "-a always,exit -F arch=b32 -C euid!=uid -F auid!=unset -S execve -k user_emulation" }
  notify: Regenerate auditd rules

- name: 6.2.3.3 | Ensure events that modify the sudo log file are collected | Live
  lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: -w {{ sudo_log_file }} -p wa -k sudo_log_file
    #backup: true
    backrefs: false
    create: true
