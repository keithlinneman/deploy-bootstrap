- name: 2.4.2.1 | Ensure at is restricted to authorized users
  ansible.builtin.file:
    path: /etc/at.allow
    state: touch
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: "0640"

# CIS 3 Network
## CIS 3.1 Configure Network Devices
- name: 3.1.1 | Ensure IPv6 status is identified | via grub boot
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX="((?:(?!ipv6.disable=1).)*?)"$'
    line: 'GRUB_CMDLINE_LINUX="\1 ipv6.disable=1"'
    mode: "0644"
    # backup: true
    backrefs: true
    create: true
  notify: Update grub

