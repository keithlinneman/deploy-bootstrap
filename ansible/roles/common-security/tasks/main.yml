    line: "{{ item.line }}"
    #backup: true
    backrefs: false
    create: true
  loop:
    - { line: "-a always,exit -F arch=b64 -S adjtimex,settimeofday -k time-change" }
    - { line: "-a always,exit -F arch=b32 -S adjtimex,settimeofday -k time-change" }
    - { line: "-a always,exit -F arch=b64 -S clock_settime -F a0=0x0 -k time-change" }
    - { line: "-a always,exit -F arch=b32 -S clock_settime -F a0=0x0 -k time-change" }
    - { line: "-w /etc/localtime -p wa -k time-change" }
  notify: Regenerate auditd rules

- name: 6.2.3.5 | Ensure events that modify the system's network environment are collected | Config
  lineinfile:
    path: /etc/audit/rules.d/phxi.rules
