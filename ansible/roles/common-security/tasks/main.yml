## CIS 5.4 User Accounts and Environment
- name: 5.4.1.1 | Ensure password expiration is 365 days or less
  ansible.builtin.replace:
    path: /etc/login.defs
    regexp: "^PASS_MAX_DAYS.*"
    replace: "PASS_MAX_DAYS {{ password_age_max_days }}"

- name: 5.4.1.1 | Ensure password expiration is 365 days or less | /etc/shadow
  ansible.builtin.shell:
    cmd: set -o pipefail && cat /etc/shadow | awk -F ':' -v 'OFS=:' '{gsub(".*","{{ password_age_max_days }}",$5)}1' > /etc/shadow.new && mv /etc/shadow.new /etc/shadow && chmod
      640 /etc/shadow && chown root:{{ system_passwd_group }} /etc/shadow
    executable: /bin/bash
  changed_when: false

- name: 5.4.1.2 | Ensure minimum password age is configured
  ansible.builtin.replace:
    path: /etc/login.defs
    regexp: "^PASS_MIN_DAYS.*"
    replace: "PASS_MIN_DAYS {{ password_age_min_days }}"

- name: 5.4.1.2 | Ensure minimum password age is configured | /etc/shadow
  ansible.builtin.shell:
    cmd: set -o pipefail && cat /etc/shadow | awk -F ':' -v 'OFS=:' '{gsub(".*","{{ password_age_min_days }}",$4)}1' > /etc/shadow.new && mv /etc/shadow.new /etc/shadow && chmod
      640 /etc/shadow && chown root:{{ system_passwd_group }} /etc/shadow
    executable: /bin/bash
  changed_when: false

- name: 5.4.1.3 | Ensure password expiration warning days is configured
  ansible.builtin.replace:
    path: /etc/login.defs
    regexp: "^PASS_WARN_AGE.*"
    replace: "PASS_WARN_AGE {{ password_expiration_warn_days }}"

- name: 5.4.1.5 | Ensure inactive password lock is configured | Config
  ansible.builtin.lineinfile:
    path: /etc/default/useradd
    regexp: "^.*INACTIVE=.*"
    line: "INACTIVE={{ password_expired_days_disabled_account }}"
    # backup: true
    backrefs: false
    create: true
    mode: "0644"

- name: 5.4.1.5 | Ensure inactive password lock is configured | shadow
  ansible.builtin.shell:
    cmd: set -o pipefail && cat /etc/shadow | awk -F ':' -v 'OFS=:' '{gsub(".*","{{ password_expired_days_disabled_account }}",$7)}1' > /etc/shadow.new
      && mv /etc/shadow.new /etc/shadow && chmod 640 /etc/shadow && chown root:{{ system_passwd_group }} /etc/shadow
    executable: /bin/bash
  changed_when: false
  when: ansible_os_family == 'Debian'

# 5.4.2.4 | Ensure root password is set
# ubuntu by default doesnt set a root password or allow the account - setting it exposes additional attack surface

- name: 5.4.2.6 | Ensure root user umask is configured
  ansible.builtin.lineinfile:
    path: /root/.bash_profile
    regexp: "^.*umask.*"
    line: "umask {{ system_filesystem_umask_root }}"
    create: true
    mode: "0644"

# 12/20/24 - adding since CIS benchmarks use grep on multiple files/paths which returns error code if any
# files/paths dont exist even if it finds pattern match in existing files/paths
- name: 5.4.2.6 | Ensure root user umask is configured | audit only
  ansible.builtin.file:
    path: /root/bashrc
    state: touch
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: "0600"

- name: 5.4.3.3 | Ensure default user umask is configured
  ansible.builtin.replace:
    path: /etc/login.defs
    regexp: "^UMASK.*"
    replace: "UMASK {{ system_filesystem_umask_default }}"

# CIS 6 Logging and Auditing
## CIS 6.1 System Logging
- name: 6.1.1.3 | Ensure journald log file rotation is configured
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    # backup: true
    backrefs: false
    create: true
    mode: "0644"
  loop:
    - { regexp: "^.*SystemMaxUse=.*", line: "SystemMaxUse={{ system_logs_size_max }}" }
    - { regexp: "^.*SystemKeepFree=.*", line: "SystemKeepFree=500M" }
    - { regexp: "^.*RuntimeMaxUse=.*", line: "RuntimeMaxUse=200M" }
    - { regexp: "^.*RuntimeKeepFree=.*", line: "RuntimeKeepFree=512M" }
    - { regexp: "^.*MaxFileSec=.*", line: "MaxFileSec=1month" }

- name: 6.1.2.1.1 | Ensure systemd-journal-remote is installed
  ansible.builtin.package:
    name: systemd-journal-remote
    state: present

- name: 6.1.2.1.4 | Ensure systemd-journal-remote service is not in use
  ansible.builtin.service:
    name: systemd-journal-remote
    state: stopped
    enabled: false

- name: 6.1.2.1.4 | Ensure systemd-journal-remote service is not in use | socket masked
  ansible.builtin.systemd_service:
    name: systemd-journal-remote.socket
    state: stopped
    enabled: false
    masked: true

- name: 6.1.2.2 | Ensure journald ForwardToSyslog is disabled
  ansible.builtin.replace:
    path: /etc/systemd/journald.conf
    regexp: "^# ForwardToSyslog=.*"
    replace: "ForwardToSyslog=no"
  notify: Restart systemd-journald service

- name: (Debian) 6.1.2.2 | Ensure journald ForwardToSyslog is disabled
  ansible.builtin.replace:
    path: /usr/lib/systemd/journald.conf.d/syslog.conf
    regexp: "^.*ForwardToSyslog=.*"
    replace: "ForwardToSyslog=no"
  when: ansible_os_family == 'Debian'
  notify: Restart systemd-journald service

- name: (Debian) 6.1.2.3 | Ensure journald is configured to compress large log files
  ansible.builtin.replace:
    path: /etc/systemd/journald.conf
    regexp: "^.*Compress=.*"
    replace: "Compress=yes"
  when: ansible_os_family == 'Debian'
  notify: Restart systemd-journald service

- name: (Debian) 6.1.2.4 | Ensure journald Storage is configured
  ansible.builtin.replace:
    path: /etc/systemd/journald.conf
    regexp: "^.*Storage=.*"
    replace: "Storage=persistent"
  when: ansible_os_family == 'Debian'
  notify: Restart systemd-journald service

## CIS 6.2 System Auditing
- name: 6.2.1.1 | Ensure auditd is installed
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop:
    - "{{ auditd_package_name }}"
    - audispd-plugins

- name: 6.2.1.3 | Ensure auditing for processes that start prior to auditd is enabled | bootloader file
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX="((?:(?!audit=1).)*?)"$'
    line: 'GRUB_CMDLINE_LINUX="\1 audit=1"'
    mode: "0664"
    # backup: true
    backrefs: true
    create: true
  notify: Update grub

- name: 6.2.1.4 | Ensure audit_backlog_limit is sufficient | bootloader file
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX="((?:(?!audit_backlog_limit=8192).)*?)"$'
    line: 'GRUB_CMDLINE_LINUX="\1 audit_backlog_limit=8192"'
    mode: "0664"
    # backup: true
    backrefs: true
    create: true
  notify: Update grub

# 6.2.2.2 | Ensure audit logs are not automatically deleted
# logs are forwarded and retained

- name: 6.2.2.1 | Ensure audit log storage size is configured
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: "^max_log_file = .*"
    line: "max_log_file = {{ service_audit_logs_max_filesize }}"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  notify: Restart service auditd

- name: 6.2.2.4 | Ensure system warns when audit logs are low on space
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: "^admin_space_left_action = .*"
    line: "admin_space_left_action = email"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  notify: Restart service auditd

- name: 6.2.2.4 | Ensure system warns when audit logs are low on space
  ansible.builtin.lineinfile:
    path: /etc/audit/auditd.conf
    regexp: "^space_left_action = .*"
    line: "space_left_action = email"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  notify: Restart service auditd

- name: 6.2.3.1 | Ensure changes to system administration scope (sudoers) is collected | Config
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "{{ item.line }}"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  loop:
    - { line: "-w /etc/sudoers -p wa -k scope" }
    - { line: "-w /etc/sudoers.d/ -p wa -k scope" }
  notify: Regenerate auditd rules

- name: 6.2.3.2 | Ensure actions as another user are always logged | Config
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "{{ item.line }}"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  loop:
    - { line: "-a always,exit -F arch=b64 -C euid!=uid -F auid!=unset -S execve -k user_emulation" }
    - { line: "-a always,exit -F arch=b32 -C euid!=uid -F auid!=unset -S execve -k user_emulation" }
  notify: Regenerate auditd rules

- name: 6.2.3.3 | Ensure events that modify the sudo log file are collected | Live
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: -w {{ sudo_log_file }} -p wa -k sudo_log_file
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  notify: Regenerate auditd rules

- name: 6.2.3.4 | Ensure events that modify date and time information are collected | Config
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "{{ item.line }}"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  loop:
    - { line: "-a always,exit -F arch=b64 -S adjtimex,settimeofday -k time-change" }
    - { line: "-a always,exit -F arch=b32 -S adjtimex,settimeofday -k time-change" }
    - { line: "-a always,exit -F arch=b64 -S clock_settime -F a0=0x0 -k time-change" }
    - { line: "-a always,exit -F arch=b32 -S clock_settime -F a0=0x0 -k time-change" }
    - { line: "-w /etc/localtime -p wa -k time-change" }
  notify: Regenerate auditd rules

- name: 6.2.3.5 | Ensure events that modify the system's network environment are collected | Config
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "{{ item.line }}"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  loop:
    - { line: "-a always,exit -F arch=b64 -S sethostname,setdomainname -k system-locale" }
    - { line: "-a always,exit -F arch=b32 -S sethostname,setdomainname -k system-locale" }
    - { line: "-w /etc/issue -p wa -k system-locale" }
    - { line: "-w /etc/issue.net -p wa -k system-locale" }
    - { line: "-w /etc/hosts -p wa -k system-locale" }
    - { line: "-w /etc/networks -p wa -k system-locale" }
    - { line: "-w /etc/network/ -p wa -k system-locale" }
    - { line: "-w /etc/netplan/ -p wa -k system-locale" }
  notify: Regenerate auditd rules

- name: 6.2.3.7 | Ensure unsuccessful unauthorized file access attempts are collected
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "{{ item.line }}"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  loop:
    - { line: "-a always,exit -F arch=b64 -S creat,open,openat,truncate,ftruncate -F exit=-EACCES -F auid>={{ system_uid_minimum }} -F auid!=unset -k access" }
    - { line: "-a always,exit -F arch=b64 -S creat,open,openat,truncate,ftruncate -F exit=-EPERM -F auid>={{ system_uid_minimum }} -F auid!=unset -k access" }
    - { line: "-a always,exit -F arch=b32 -S creat,open,openat,truncate,ftruncate -F exit=-EACCES -F auid>={{ system_uid_minimum }} -F auid!=unset -k access" }
    - { line: "-a always,exit -F arch=b32 -S creat,open,openat,truncate,ftruncate -F exit=-EPERM -F auid>={{ system_uid_minimum }} -F auid!=unset -k access" }
  notify: Regenerate auditd rules

- name: 6.2.3.8 | Ensure events that modify user/group information are collected | Live
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "{{ item.line }}"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  loop:
    - { line: "-w /etc/group -p wa -k identity" }
    - { line: "-w /etc/passwd -p wa -k identity" }
    - { line: "-w /etc/gshadow -p wa -k identity" }
    - { line: "-w /etc/shadow -p wa -k identity" }
    - { line: "-w /etc/security/opasswd -p wa -k identity" }
    - { line: "-w /etc/nsswitch.conf -p wa -k identity" }
    - { line: "-w /etc/pam.conf -p wa -k identity" }
    - { line: "-w /etc/pam.d -p wa -k identity" }
  notify: Regenerate auditd rules

- name: 6.2.3.9 | Ensure discretionary access control permission modification events are collected | Config
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "{{ item.line }}"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  loop:
    - { line: "-a always,exit -F arch=b64 -S chmod,fchmod,fchmodat -F auid>={{ system_uid_minimum }} -F auid!=unset -F key=perm_mod" }
    - { line: "-a always,exit -F arch=b64 -S chown,fchown,lchown,fchownat -F auid>={{ system_uid_minimum }} -F auid!=unset -F key=perm_mod" }
    - { line: "-a always,exit -F arch=b32 -S chmod,fchmod,fchmodat -F auid>={{ system_uid_minimum }} -F auid!=unset -F key=perm_mod" }
    - { line: "-a always,exit -F arch=b32 -S lchown,fchown,chown,fchownat -F auid>={{ system_uid_minimum }} -F auid!=unset -F key=perm_mod" }
    - { line: "-a always,exit -F arch=b64 -S setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F auid>={{ system_uid_minimum }} -F auid!=unset -F key=perm_mod" }
    - { line: "-a always,exit -F arch=b32 -S setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F auid>={{ system_uid_minimum }} -F auid!=unset -F key=perm_mod" }
  notify: Regenerate auditd rules

- name: 6.2.3.10 | Ensure successful file system mounts are collected | Config
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "{{ item.line }}"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  loop:
    - { line: "-a always,exit -F arch=b32 -S mount -F auid>={{ system_uid_minimum }} -F auid!=unset -k mounts" }
    - { line: "-a always,exit -F arch=b64 -S mount -F auid>={{ system_uid_minimum }} -F auid!=unset -k mounts" }
  notify: Regenerate auditd rules

- name: 6.2.3.11 | Ensure session initiation information is collected | Config
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "{{ item.line }}"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  loop:
    - { line: "-w /var/run/utmp -p wa -k session" }
    - { line: "-w /var/log/wtmp -p wa -k session" }
    - { line: "-w /var/log/btmp -p wa -k session" }
  notify: Regenerate auditd rules

- name: 6.2.3.12 | Ensure login and logout events are collected | Config
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "{{ item.line }}"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  loop:
    - { line: "-w /var/log/lastlog -p wa -k logins" }
    - { line: "-w /var/run/faillock -p wa -k logins" }
  notify: Regenerate auditd rules

- name: 6.2.3.13 | Ensure file deletion events by users are collected | Config
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "{{ item.line }}"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  loop:
    - { line: "-a always,exit -F arch=b64 -S rename,unlink,unlinkat,renameat -F auid>={{ system_uid_minimum }} -F auid!=unset -F key=delete" }
    - { line: "-a always,exit -F arch=b32 -S rename,unlink,unlinkat,renameat -F auid>={{ system_uid_minimum }} -F auid!=unset -F key=delete" }
  notify: Regenerate auditd rules

- name: 6.2.3.14 | Ensure events that modify the system's Mandatory Access Controls are collected | Config
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "{{ item.line }}"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  loop:
    - { line: "-w /etc/apparmor/ -p wa -k MAC-policy" }
    - { line: "-w /etc/apparmor.d/ -p wa -k MAC-policy" }
  notify: Regenerate auditd rules

- name: 6.2.3.15 | Ensure successful and unsuccessful attempts to use the chcon command are recorded | Config
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: -a always,exit -F path=/usr/bin/chcon -F perm=x -F auid>={{ system_uid_minimum }} -F auid!=unset -k perm_chng
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  notify: Regenerate auditd rules

- name: 6.2.3.16 | Ensure successful and unsuccessful attempts to use the setfacl command are recorded | Config
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: -a always,exit -F path=/usr/bin/setfacl -F perm=x -F auid>={{ system_uid_minimum }} -F auid!=unset -k perm_chng
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  notify: Regenerate auditd rules

- name: 6.2.3.17 | Ensure successful and unsuccessful attempts to use the chacl command are recorded | Config
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: -a always,exit -F path=/usr/bin/chacl -F perm=x -F auid>={{ system_uid_minimum }} -F auid!=unset -k perm_chng
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  notify: Regenerate auditd rules

- name: 6.2.3.18 | Ensure successful and unsuccessful attempts to use the usermod command are recorded | Config
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "-a always,exit -F path=/usr/sbin/usermod -F perm=x -F auid>={{ system_uid_minimum }} -F auid!=unset -k usermod"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  notify: Regenerate auditd rules

- name: 6.2.3.19 | Ensure kernel module loading and unloading is collected | Config
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "{{ item.line }}"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  loop:
    - line: "-a always,exit -F arch=b64 -S init_module,finit_module,delete_module,create_module,query_module -F auid>=1000 -F auid!=unset -k kernel_modules"
    - { line: "-a always,exit -F path=/usr/bin/kmod -F perm=x -F auid>=1000 -F auid!=unset -k kernel_modules" }
  notify: Regenerate auditd rules

- name: 6.2.3.20 | Ensure the audit configuration is immutable
  ansible.builtin.lineinfile:
    path: /etc/audit/rules.d/phxi.rules
    line: "-e 2"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  notify: Regenerate auditd rules

- name: 6.3.3 | Ensure cryptographic mechanisms are used to protect the integrity of audit tools | pkg
  ansible.builtin.package:
    name: "{{ aide_package_name }}"
    state: present

- name: (Debian) 6.3.3 | Ensure cryptographic mechanisms are used to protect the integrity of audit tools | pkg
  ansible.builtin.package:
    name: aide-common
    state: present
  when: ansible_os_family == 'Debian'

## CIS 6.3 Configure Integrity Checking
- name: 6.3.3 | Ensure cryptographic mechanisms are used to protect the integrity of audit tools | config
  ansible.builtin.lineinfile:
    path: /etc/aide/aide.conf.d/01-phxi.conf
    line: "{{ item.line }}"
    mode: "0640"
    # backup: true
    backrefs: false
    create: true
  loop:
    - { line: "# Audit Tools" }
    - { line: "/usr/sbin/auditctl p+i+n+u+g+s+b+acl+xattrs+sha512" }
    - { line: "/usr/sbin/auditd p+i+n+u+g+s+b+acl+xattrs+sha512" }
    - { line: "/usr/sbin/ausearch p+i+n+u+g+s+b+acl+xattrs+sha512" }
    - { line: "/usr/sbin/aureport p+i+n+u+g+s+b+acl+xattrs+sha512" }
    - { line: "/usr/sbin/autrace p+i+n+u+g+s+b+acl+xattrs+sha512" }
    - { line: "/usr/sbin/augenrules p+i+n+u+g+s+b+acl+xattrs+sha512" }
  notify: Refresh aide database

# TODO: Takes ~10 minutes to run - this should run on a delay in the background if run at deploy time and not ami generation time
# just letting the refresh aide database notifier handle this for now
# re-adding and registering variable to prevent duplicate run from handler

- name: 6.3.3 | Ensure crypotographic mechanisms are used to protect the integrity of audit tools | live db
  ansible.builtin.command:
    cmd: aide --init --config {{ aide_config_location }}
    creates: /var/lib/aide/aide.db
  register: aidinitstatus

#  # CIS 7 System Maintenance
#  ## CIS 7.2 Local User and Group Settings
#  - name: 7.2.10 | Ensure local interactive user dot files access is configured | dot files permissions
- name: Remove ubuntu landscape folder (group write permissions fail audits and package is removed)
  ansible.builtin.file:
    state: absent
    path: /home/ubuntu/.landscape
  when: ansible_distribution == 'Ubuntu'
