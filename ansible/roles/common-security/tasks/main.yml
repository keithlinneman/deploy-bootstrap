#  - name: 2.4.1.8 | Ensure cron is restricted to authorized users | cron.allow
#    group:
#      name: cronallowed
#      state: present

- name: 2.4.1.8 | Ensure cron is restricted to authorized users | cron.allow
  ansible.builtin.file:
    path: /etc/cron.allow
    state: touch
    modification_time: preserve
    access_time: preserve
    owner: root
    group: crontab
