## CIS 3.3 Configure Network Kernel Parameters
- name: 3.3.1 | Ensure IP forwarding is disabled | IPv4 config
  ansible.builtin.lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: "^net.ipv4.ip_forward = .*"
    line: "net.ipv4.ip_forward = 0"
    mode: "0644"
    # backup: true
    backrefs: false
    create: true
  notify: Reload sysctl values

- name: 3.3.2 | Ensure packet redirect sending is disabled | default send_redirect config
  ansible.builtin.lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    mode: "0644"
    # backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^net.ipv4.conf.default.send_redirects=.*", line: "net.ipv4.conf.default.send_redirects=0" }
    - { regexp: "^net.ipv4.conf.all.send_redirects=.*", line: "net.ipv4.conf.all.send_redirects=0" }
  notify: Reload sysctl values

- name: 3.3.3 | Ensure bogus ICMP responses are ignored | ignore bogus icmp conf
  ansible.builtin.lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: "^net.ipv4.icmp_ignore_bogus_error_responses = .*"
    line: "net.ipv4.icmp_ignore_bogus_error_responses = 1"
    mode: "0644"
    # backup: true
    backrefs: false
    create: true
  notify: Reload sysctl values

# creating empty conf dir because some compliance checks use error exit code when searching multiple folders otherwise
- name: Create /etc/systemd/journald.conf.d/ directory
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d/
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: "0755"
    state: directory
- name: Create empty /etc/systemd/journald.conf.d/99-empty.conf file
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d/99-empty.conf
    state: touch
    modification_time: preserve
    access_time: preserve
    owner: root
    group: root
    mode: "0644"

- name: 3.3.4 | Ensure broadcast ICMP requests are ignored | ipv4 ignore broadcast icmp conf
  ansible.builtin.lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: "^net.ipv4.icmp_echo_ignore_broadcasts = .*"
    line: "net.ipv4.icmp_echo_ignore_broadcasts = 1"
    mode: "0644"
    # backup: true
    backrefs: false
    create: true
  notify: Reload sysctl values

- name: 3.3.5 | Ensure ICMP redirects are not accepted | ipv4 all icmp redirects conf
  ansible.builtin.lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    mode: "0644"
    # backup: true
    backrefs: false
    create: true
  loop:
    - { regexp: "^.*net.ipv4.conf.all.accept_redirects = .*", line: "net.ipv4.conf.all.accept_redirects = 0" }
    - { regexp: "^.*net.ipv4.conf.default.accept_redirects = .*", line: "net.ipv4.conf.default.accept_redirects = 0" }
  notify: Reload sysctl values

- name: 3.3.6 | Ensure secure ICMP redirects are not accepted | ipv4 all sec redirects conf
  ansible.builtin.lineinfile:
    path: /etc/sysctl.d/99-phxi.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    mode: "0644"
    # backup: true
    backrefs: false
    create: true
  loop:
