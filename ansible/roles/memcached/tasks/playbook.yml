---
 - name: memcached playbook
   hosts: all
   become: true
   vars_files:
     - ../vars/default.yml
     - ../vars/{{ ansible_os_family }}.yml

   tasks:
     - name: Get instance metadata
       ec2_metadata_facts:

     - name: Print all environment vars for debugging
       debug:
         var: hostvars[inventory_hostname]
         verbosity: 2

     - name: Ensure required variables are defined
       fail:
         msg: "{{ item }} must be defined use -e {{ item }}=value"
       when: (lookup('vars', item, default=None)) is none
       with_items:
         - env

     - name: Create memcached user
       user:
         name: "{{ memcached_system_user }}"
         password: '*'
         umask: 0027
         shell: /usr/sbin/nologin
         system: true

     - name: Ensure memcached package is installed
       package:
         name: "{{ memcached_package_name }}"
         state: present

     - name: Modify memcached configuration
       template:
         src: ../templates/etc/memcached.conf.j2
         dest: /etc/memcached.conf
         mode: 0644
       when: ansible_os_family == 'Debian'
       notify: restart memcached service

     - name: Allow memcached traffic through firewall
       ufw:
         port: "{{ memcached_tcp_port }}"
         proto: tcp
         rule: allow
       when: ansible_distribution == 'Ubuntu'

     - name: Get latest memcached_exporter release info from github
       uri:
         url: https://api.github.com/repos/prometheus/memcached_exporter/releases/latest
         return_content: yes
       register: release_info

     - name: Set release tag fact
       set_fact:
         release_tag: "{{ release_info.json.tag_name }}"

     - name: Set filename based on architecture
       set_fact:
         memcached_exporter_filename: >-
           {%- if ansible_architecture == "aarch64" -%}
           linux-arm64.tar.gz
           {%- else -%}
           linux-amd64.tar.gz
           {%- endif -%}

     - name: Find {{ ansible_architecture }} asset URL from release assets
       set_fact:
         asset_url: "{{ item.browser_download_url }}"
       loop: "{{ release_info.json.assets }}"
       when: "memcached_exporter_filename in item.name"

     - name: Fail if architecture asset not found
       fail:
         msg: "No {{ ansible_architecture }} asset found github latest release response."
       when: asset_url is not defined

     - name: Download the latest memcached_exporter release from github
       get_url:
         url: "{{ asset_url }}"
         dest: /root/memcached_exporter.tar.gz

     - name: Decompress memcached_exporter installation package
       unarchive:
         src: /root/memcached_exporter.tar.gz
         dest: /usr/bin/
         extra_opts: ['--wildcards','--strip-components=1','--show-stored-names']
         owner: root
         group: root
         include: "*/memcached_exporter"
         mode: 0755
         creates: /usr/bin/memcached_exporter

     - name: Remove the memcached_exporter installation package
       file:
         path: /root/memcached_exporter.tar.gz
         state: absent

     - name: Create memcached_exporter systemd service
       template:
         src: ../templates/etc/systemd/system/{{ memcached_exporter_systemd_service_name }}.service.j2
         dest: /etc/systemd/system/{{ memcached_exporter_systemd_service_name }}.service
         mode: 0644
       notify: restart memcached_exporter service

     - name: Allow memcached-exporter traffic through firewall
       ufw:
         port: "{{ memcached_exporter_tcp_port }}"
         proto: tcp
         rule: allow
       when: ansible_distribution == 'Ubuntu'

     # let the restart handlers enable the service, otherwise will get daemon_reload warnings first run
     #- name: Enable memcached systemd service
     #  service:
     #    name: "{{ memcached_systemd_service_name }}"
     #    state: started
     #    enabled: true

     #- name: Enable memcached_exporter systemd service
     #  service:
     #    name: "{{ memcached_exporter_systemd_service_name }}"
     #    state: started
     #    enabled: true

   handlers:
     - name: restart memcached service
       systemd:
         name: "{{ memcached_systemd_service_name }}"
         state: restarted
         enabled: true
         daemon_reload: true

     - name: restart memcached_exporter service
       systemd:
         name: "{{ memcached_exporter_systemd_service_name }}"
         state: restarted
         enabled: true
         daemon_reload: true
