---
- name: Include OS variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "../vars/{{ ansible_distribution }}.yml"
    - "../vars/{{ ansible_os_family }}.yml"

- name: Get instance metadata
  amazon.aws.ec2_metadata_facts:

- name: Set facts from ssm here since they require ec2 metadata to lookup region
  ansible.builtin.set_fact:
    account_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/account/name', region=ansible_ec2_instance_identity_document_region) }}"
    artifacts_bucket_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/artifacts/bucket/name', region=ansible_ec2_instance_identity_document_region) }}"
    company_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/company/name', region=ansible_ec2_instance_identity_document_region) }}"
    hosted_zone_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/dns/hosted_zone/name', region=ansible_ec2_instance_identity_document_region) }}"
    platform_env: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/name', region=ansible_ec2_instance_identity_document_region) }}"
    rekor_s3_bucket: "{{ lookup('amazon.aws.aws_ssm', '/platform/rekor/s3/bucket/name', region=ansible_ec2_instance_identity_document_region) }}"
    rekor_config_database_credentials: "{{ lookup('amazon.aws.aws_secret', 'app/rekor/server/db/mysql/credentials', region=ansible_ec2_instance_identity_document_region)
      }}"
    rekor_config_checkpoint_signer: "{{ lookup('amazon.aws.aws_ssm', rekor_kms_signer_param, region=ansible_ec2_instance_identity_document_region) }}"
  no_log: true

- name: Set facts from environment variables
  ansible.builtin.set_fact:
    service_name: "{{ ansible_env.SERVICENAME | default('unknown') }}"
    service_component: "{{ ansible_env.SERVICECOMPONENT | default(ansible_env.SERVICENAME | default('unknown')) }}"
    project: "{{ ansible_env.PROJECT | default('unknown') }}"
    service_namespace: "{{ ansible_env.NAMESPACE | default('unknown') }}"

- name: Build database connection string
  ansible.builtin.set_fact:
    rekor_database_dsn: "{{ rekor_config_database_credentials.username }}:{{ rekor_config_database_credentials.password }}@tcp({{ rekor_config_database_credentials.host
      }}:{{ rekor_config_database_credentials.port }})/{{ rekor_db_name }}?tls=true"
  no_log: true

- name: Set base application directory
  ansible.builtin.set_fact:
    rekor_app_dir: "/opt/rekor/server"

- name: Print all environment vars for debugging
  ansible.builtin.debug:
    var: hostvars[inventory_hostname]
    verbosity: 2

- name: Ensure required variables are defined
  ansible.builtin.fail:
    msg: "{{ item }} must be defined use -e {{ item }}=value"
  when: (lookup('vars', item, default=None)) is none
  loop:
    - account_name
    - artifacts_bucket_name
    - company_name
    - hosted_zone_name
    - platform_env
    - rekor_s3_bucket
    - rekor_config_checkpoint_signer
    - service_name
    - service_component
    - project
    - service_namespace
    - rekor_database_dsn

- name: Create rekor user
  ansible.builtin.user:
    name: "{{ rekor_server_system_user }}"
    password: "*"
    umask: "027"
    shell: /usr/sbin/nologin
    system: true

- name: Create rekor directories
  ansible.builtin.file:
    path: "{{ rekor_app_dir }}/bin"
    owner: "root"
    group: "{{ rekor_server_system_user }}"
    mode: "0750"
    state: directory

- name: Set architecture format based on normalized naming
  ansible.builtin.set_fact:
    architecture_normalized_name: >-
      {%- if ansible_architecture == "aarch64" -%} arm64{%- else -%} amd64{%- endif -%}

- name: Check current binary hash
  ansible.builtin.stat:
    path: "{{ rekor_app_dir }}/bin/rekor-server"
    checksum_algorithm: sha256
    get_checksum: true
  register: current_binary
  ignore_errors: true

- name: Deploy rekor binary
  when: current_binary.stat.checksum | default('') != rekor_binary_sha256
  block:
    - name: Set binary staging directory path
      ansible.builtin.set_fact:
        staging_dir: "{{ rekor_app_dir }}/bin/.staging"

    - name: Create binary staging directory
      ansible.builtin.file:
        path: "{{ staging_dir }}"
        state: directory
        mode: "0700"

    - name: Get pinned rekor release from s3 artifacts bucket
      amazon.aws.s3_object:
        bucket: "{{ artifacts_bucket_name }}"
        object: "thirdparty/sigstore/rekor-tiles/v{{ rekor_version }}/rekor-server-aws-linux-{{ architecture_normalized_name }}"
        dest: "{{ staging_dir }}/rekor-server"
        mode: get
        overwrite: always

    - name: Compute sha256 of downloaded binary
      ansible.builtin.stat:
        path: "{{ staging_dir }}/rekor-server"
        checksum_algorithm: sha256
        get_checksum: true
      register: staged_binary

    - name: Verify sha256 matches release index
      ansible.builtin.fail:
        msg: >-
          SHA256 mismatch: expected {{ rekor_binary_sha256 }},
          got {{ staged_binary.stat.checksum }}
      when: staged_binary.stat.checksum != rekor_binary_sha256

    - name: Ensure binary has correct permissions
      ansible.builtin.file:
        path: "{{ staging_dir }}/rekor-server"
        mode: "0755"
        owner: root
        group: root

    - name: Move verified binary into place
      ansible.builtin.command:
        cmd: mv "{{ staging_dir }}/rekor-server" "{{ rekor_app_dir }}/bin/rekor-server"
        removes: "{{ staging_dir }}/rekor-server"
        creates: "{{ rekor_app_dir }}/bin/rekor-server"
      notify: Restart rekor service

    - name: Clean staging directory
      ansible.builtin.file:
        path: "{{ staging_dir }}"
        state: absent

- name: Ensure /etc/rekor directory exists
  ansible.builtin.file:
    path: /etc/rekor
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Build rekor env content
  ansible.builtin.set_fact:
    rekor_env_content: |
      REKOR_HTTP_ADDRESS={{ rekor_server_http_address }}
      REKOR_HTTP_PORT={{ rekor_server_http_port }}
      REKOR_GRPC_ADDRESS={{ rekor_server_grpc_address }}
      REKOR_GRPC_PORT={{ rekor_server_grpc_port }}
      REKOR_METRICS_PORT={{ rekor_server_metrics_port }}
      REKOR_LOG_LEVEL={{ rekor_log_level }}
      REKOR_S3_BUCKET={{ rekor_s3_bucket }}
      REKOR_HOSTNAME={{ rekor_hostname }}
      REKOR_KMS_KEY_SIGNER={{ rekor_config_checkpoint_signer }}
      REKOR_DATABASE_DSN="{{ rekor_database_dsn }}"
      REKOR_KMS_HASH={{ rekor_kms_hash_algorithm }}
      AWS_REGION={{ ansible_ec2_instance_identity_document_region }}
  no_log: true

- name: Write rekor environment file
  ansible.builtin.copy:
    dest: /etc/rekor/rekor-server.env
    owner: root
    group: root
    mode: "0600"
    content: "{{ rekor_env_content }}"
  no_log: true
  notify:
    - restart rekor service

- name: Create rekor systemd service
  ansible.builtin.template:
    src: /etc/systemd/system/{{ rekor_server_systemd_service_name }}.service.j2
    dest: /etc/systemd/system/{{ rekor_server_systemd_service_name }}.service
    mode: "0644"
  notify: Restart rekor service

- name: Install RDS CA bundle for mysql tls
  when: rekor_db_type == "rds"
  block:
    - name: Download RDS CA bundle
      ansible.builtin.get_url:
        url: "https://truststore.pki.rds.amazonaws.com/{{ ansible_ec2_instance_identity_document_region }}/{{ ansible_ec2_instance_identity_document_region }}-bundle.pem"
        dest: /tmp/rds-ca-bundle.pem
        mode: "0644"

    - name: Split RDS CA bundle into individual certs
      ansible.builtin.shell:
        # yamllint disable-line rule:line-length
        cmd: awk 'BEGIN {n=0} /-----BEGIN CERTIFICATE-----/ {n++; filename=sprintf("/usr/local/share/ca-certificates/rds-{{ ansible_ec2_instance_identity_document_region }}-%d.crt", n)} {print > filename}' /tmp/rds-ca-bundle.pem
        creates: /usr/local/share/ca-certificates/rds-{{ ansible_ec2_instance_identity_document_region }}-1.crt
      notify: Update system CA certificates

- name: Allow rekor http traffic through firewall
  community.general.ufw:
    port: "{{ rekor_server_http_port }}"
    proto: tcp
    rule: allow
  when: ansible_distribution == 'Ubuntu'

- name: Allow rekor metrics traffic through firewall
  community.general.ufw:
    port: "{{ rekor_server_metrics_port }}"
    proto: tcp
    rule: allow
  when: ansible_distribution == 'Ubuntu'

# flush handlers for service restart, then ensure its started after.
# prevents starting in task -> restarting in notified handlers during bootstrap, ensures its running for idempotent runs
- name: Flush pending handlers
  ansible.builtin.meta: flush_handlers
- name: Enable rekor systemd service
  ansible.builtin.service:
    name: "{{ rekor_server_systemd_service_name }}"
    enabled: true
