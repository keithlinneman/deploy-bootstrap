---
- name: Include OS variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "../vars/{{ ansible_distribution }}.yml"
    - "../vars/{{ ansible_os_family }}.yml"

- name: Get instance metadata
  amazon.aws.ec2_metadata_facts:

- name: Set facts from ssm here since they require ec2 metadata to lookup region
  ansible.builtin.set_fact:
    account_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/account/name', region=ansible_ec2_instance_identity_document_region) }}"
    artifacts_bucket_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/artifacts/bucket/name', region=ansible_ec2_instance_identity_document_region) }}"
    company_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/company/name', region=ansible_ec2_instance_identity_document_region) }}"
    hosted_zone_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/dns/hosted_zone/name', region=ansible_ec2_instance_identity_document_region) }}"
    platform_env: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/name', region=ansible_ec2_instance_identity_document_region) }}"
    fulcio_config_timestamp_signer: "{{ lookup('amazon.aws.aws_ssm', fulcio_kms_signer_param, region=ansible_ec2_instance_identity_document_region) }}"
    trust_materials_bucket_name: "{{ lookup('amazon.aws.aws_ssm', fulcio_trust_materials_bucket_param, region=ansible_ec2_instance_identity_document_region) }}"

- name: Set facts from environment variables
  ansible.builtin.set_fact:
    service_name: "{{ ansible_env.SERVICENAME | default('unknown') }}"
    service_component: "{{ ansible_env.SERVICECOMPONENT | default(ansible_env.SERVICENAME | default('unknown')) }}"
    project: "{{ ansible_env.PROJECT | default('unknown') }}"
    namespace: "{{ ansible_env.NAMESPACE | default('unknown') }}"

- name: Set base application directory
  ansible.builtin.set_fact:
    fulcio_app_dir: "/opt/fulcio/server"

- name: Print all environment vars for debugging
  ansible.builtin.debug:
    var: hostvars[inventory_hostname]
    verbosity: 2

- name: Ensure required variables are defined
  ansible.builtin.fail:
    msg: "{{ item }} must be defined use -e {{ item }}=value"
  when: (lookup('vars', item, default=None)) is none
  loop:
    - account_name
    - artifacts_bucket_name
    - company_name
    - hosted_zone_name
    - platform_env
    - fulcio_config_timestamp_signer
    - service_name
    - service_component
    - project
    - namespace
    - trust_materials_bucket_name

- name: Create fulcio user
  ansible.builtin.user:
    name: "{{ fulcio_server_system_user }}"
    password: "*"
    umask: "027"
    shell: /usr/sbin/nologin
    system: true

- name: Create fulcio directories
  ansible.builtin.file:
    path: "{{ fulcio_app_dir }}/{{ item }}"
    owner: "root"
    group: "{{ fulcio_server_system_user }}"
    mode: "0750"
    state: directory
  loop:
    - bin
    - certs
    - conf

- name: Set architecture format based on normalized naming
  ansible.builtin.set_fact:
    architecture_normalized_name: >-
      {%- if ansible_architecture == "aarch64" -%} arm64{%- else -%} amd64{%- endif -%}

- name: Check current binary hash
  ansible.builtin.stat:
    path: "{{ fulcio_app_dir }}/bin/fulcio-server"
    checksum_algorithm: sha256
    get_checksum: true
  register: current_binary
  ignore_errors: true

- name: Deploy fulcio binary
  when: current_binary.stat.checksum | default('') != fulcio_binary_sha256
  block:
    - name: Set binary staging directory path
      ansible.builtin.set_fact:
        staging_dir: "{{ fulcio_app_dir }}/bin/.staging"

    - name: Create binary staging directory
      ansible.builtin.file:
        path: "{{ staging_dir }}"
        state: directory
        mode: "0700"

    - name: Get pinned fulcio release from s3 artifacts bucket
      amazon.aws.s3_object:
        bucket: "{{ artifacts_bucket_name }}"
        object: "thirdparty/sigstore/fulcio/v{{ fulcio_version }}/fulcio-linux-{{ architecture_normalized_name }}"
        dest: "{{ staging_dir }}/fulcio-server"
        mode: get
        overwrite: always

    - name: Compute sha256 of downloaded binary
      ansible.builtin.stat:
        path: "{{ staging_dir }}/fulcio-server"
        checksum_algorithm: sha256
        get_checksum: true
      register: staged_binary

    - name: Verify sha256 matches release index
      ansible.builtin.fail:
        msg: >-
          SHA256 mismatch: expected {{ fulcio_binary_sha256 }},
          got {{ staged_binary.stat.checksum }}
      when: staged_binary.stat.checksum != fulcio_binary_sha256

    - name: Ensure binary has correct permissions
      ansible.builtin.file:
        path: "{{ staging_dir }}/fulcio-server"
        mode: "0755"
        owner: root
        group: root

    - name: Move verified binary into place
      ansible.builtin.command: mv "{{ staging_dir }}/fulcio-server" "{{ fulcio_app_dir }}/bin/fulcio-server"
      notify: restart fulcio service

    - name: Clean staging directory
      ansible.builtin.file:
        path: "{{ staging_dir }}"
        state: absent

- name: Copy fulcio certificate chain from s3 trust-materials bucket
  amazon.aws.s3_object:
    bucket: "{{ trust_materials_bucket_name }}"
    object: "{{ fulcio_trust_materials_cert_chain_path }}"
    dest: "{{ fulcio_app_dir }}/certs/fulcio-ca-chain.pem"
    mode: get
    overwrite: different
  notify: restart fulcio service

- name: Ensure certificate chain has correct permissions
  ansible.builtin.file:
    path: "{{ fulcio_app_dir }}/certs/fulcio-ca-chain.pem"
    mode: "0644"
    owner: root
    group: "{{ fulcio_server_system_user }}"

- name: Copy tesseract checkpoint pubkey from s3 trust-materials bucket
  amazon.aws.s3_object:
    bucket: "{{ trust_materials_bucket_name }}"
    object: "{{ fulcio_trust_materials_tesseract_checkpoint_pubkey_path }}"
    dest: "{{ fulcio_app_dir }}/certs/tesseract-checkpoint.pub"
    mode: get
    overwrite: different
  notify: restart fulcio service

- name: Ensure tesseract pubkey has correct permissions
  ansible.builtin.file:
    path: "{{ fulcio_app_dir }}/certs/tesseract-checkpoint.pub"
    mode: "0644"
    owner: root
    group: "{{ fulcio_server_system_user }}"

- name: Ensure /etc/fulcio directory exists
  ansible.builtin.file:
    path: /etc/fulcio
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Build fulcio env content
  ansible.builtin.set_fact:
    fulcio_env_content: |
      FULCIO_CA_TYPE="{{ fulcio_ca_type }}"
      FULCIO_CONF_PATH="{{ fulcio_app_dir }}/conf/config.yaml"
      FULCIO_CT_LOG_URL="{{ fulcio_ct_log_url }}"
      FULCIO_FILECA_WATCH="{{ fulcio_fileca_watch }}"
      FULCIO_HTTP_ADDRESS="{{ fulcio_server_http_address }}"
      FULCIO_HTTP_PORT="{{ fulcio_server_http_port }}"
      FULCIO_GRPC_ADDRESS="{{ fulcio_server_grpc_address }}"
      FULCIO_GRPC_PORT="{{ fulcio_server_grpc_port }}"
      FULCIO_KMS_SIGNER="{{ fulcio_config_timestamp_signer }}"
      FULCIO_LOG_TYPE="{{ fulcio_log_type }}"
      FULCIO_METRICS_PORT="{{ fulcio_server_metrics_port }}"
      FULCIO_CERT_CHAIN_PATH="{{ fulcio_app_dir }}/certs/fulcio-ca-chain.pem"
      FULCIO_TESSERACT_CHECKPOINT_PUBKEY_PATH="{{ fulcio_app_dir }}/certs/tesseract-checkpoint.pub"
      AWS_REGION={{ ansible_ec2_instance_identity_document_region }}

- name: Write fulcio environment file
  ansible.builtin.copy:
    dest: /etc/fulcio/fulcio-server.env
    owner: root
    group: root
    mode: "0600"
    content: "{{ fulcio_env_content }}"
  notify:
    - restart fulcio service

- name: Create fulcio systemd service
  ansible.builtin.template:
    src: ../templates/etc/systemd/system/{{ fulcio_server_systemd_service_name }}.service.j2
    dest: /etc/systemd/system/{{ fulcio_server_systemd_service_name }}.service
    mode: "0644"
  notify: restart fulcio service

- name: Allow fulcio http traffic through firewall
  community.general.ufw:
    port: "{{ fulcio_server_http_port }}"
    proto: tcp
    rule: allow
  when: ansible_distribution == 'Ubuntu'

- name: Allow fulcio grpc traffic through firewall
  community.general.ufw:
    port: "{{ fulcio_server_grpc_port }}"
    proto: tcp
    rule: allow
  when: ansible_distribution == 'Ubuntu'

- name: Allow fulcio metrics traffic through firewall
  community.general.ufw:
    port: "{{ fulcio_server_metrics_port }}"
    proto: tcp
    rule: allow
  when: ansible_distribution == 'Ubuntu'

- name: Create fulcio configuration file
  ansible.builtin.template:
    src: ../templates/fulcio/config.yaml.j2
    dest: "{{ fulcio_app_dir }}/conf/config.yaml"
    owner: root
    group: root
    mode: "0644"
  notify: restart fulcio service

# flush handlers for service restart, then ensure its started after.
# prevents starting in task -> restarting in notified handlers during bootstrap, ensures its running for idempotent runs
- name: Flush pending handlers
  ansible.builtin.meta: flush_handlers
- name: Enable fulcio systemd service
  ansible.builtin.service:
    name: "{{ fulcio_server_systemd_service_name }}"
    enabled: true
