---
- name: Include OS variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "../vars/{{ ansible_distribution }}.yml"
    - "../vars/{{ ansible_os_family }}.yml"

- name: Get instance metadata
  amazon.aws.ec2_metadata_facts:

- name: Print all environment vars for debugging
  ansible.builtin.debug:
    var: hostvars[inventory_hostname]
    verbosity: 2

#- name: Ensure required variables are defined
#  fail:
#    msg: "{{ item }} must be defined use -e {{ item }}=value"
#  when: (lookup('vars', item, default=None)) is none
#  loop:
#    - env

- name: Create etcd user
  ansible.builtin.user:
    name: "{{ etcd_system_user }}"
    password: "*"
    umask: "027"
    shell: /usr/sbin/nologin
    system: true

- name: Check if etcd is already installed
  ansible.builtin.stat:
    path: /home/{{ etcd_system_user }}/bin/etcd
  register: etcd_binary

- name: Get latest etcd release info from github
  ansible.builtin.uri:
    url: https://api.github.com/repos/etcd-io/etcd/releases/latest
    return_content: true
  register: release_info
  when: not etcd_binary.stat.exists

- name: Set release tag fact
  ansible.builtin.set_fact:
    release_tag: "{{ release_info.json.tag_name }}"
  when: not etcd_binary.stat.exists

- name: Set filename based on architecture
  ansible.builtin.set_fact:
    etcd_arch: >-
      {%- if ansible_architecture == "aarch64" -%} etcd-{{ release_tag }}-linux-arm64.tar.gz{%- else -%} etcd-{{ release_tag }}-linux-amd64.tar.gz{%- endif -%}
  when: not etcd_binary.stat.exists

- name: Find asset URL from release assets based on architecture
  ansible.builtin.set_fact:
    asset_url: "{{ (release_info.json.assets | selectattr('name', 'equalto', etcd_arch) | map(attribute='browser_download_url') | first) }}"
  when: not etcd_binary.stat.exists

- name: Fail if asset not found for our architecture
  ansible.builtin.fail:
    msg: "No asset found github latest release response matching our architecture {{ ansible_architecture }}"
  when: asset_url is not defined and not etcd_binary.stat.exists

- name: Download the latest etcd ({{ release_tag }}) release from github
  ansible.builtin.get_url:
    url: "{{ asset_url }}"
    dest: /home/{{ etcd_system_user }}/etcd.tar.gz
    owner: "{{ etcd_system_user }}"
    group: "{{ etcd_system_user }}"
    mode: "0750"
  when: not etcd_binary.stat.exists

- name: Create etcd bin, conf, data directories
  ansible.builtin.file:
    path: /home/{{ etcd_system_user }}/{{ item }}
    owner: "{{ etcd_system_user }}"
    group: "{{ etcd_system_user }}"
    mode: "0700"
    state: directory
  loop:
    - bin
    - conf
    - data
    - data/wal

- name: Decompress etcd installation package
  ansible.builtin.unarchive:
    src: /home/{{ etcd_system_user }}/etcd.tar.gz
    dest: /home/{{ etcd_system_user }}/bin
    extra_opts: ["--wildcards", "--strip-components=1", "--show-stored-names"]
    owner: "{{ etcd_system_user }}"
    group: "{{ etcd_system_user }}"
    mode: "0750"
    creates: /home/{{ etcd_system_user }}/bin/etcd
    include:
      - "*/etcd"
      - "*/etcdctl"
      - "*/etcdutl"

- name: Remove the etcd installation package
  ansible.builtin.file:
    path: /home/{{ etcd_system_user }}/etcd.tar.gz
    state: absent

- name: Create etcd systemd service
  ansible.builtin.template:
    src: ../templates/etc/systemd/system/{{ etcd_systemd_service_name }}.service.j2
    dest: /etc/systemd/system/{{ etcd_systemd_service_name }}.service
    mode: "0644"

- name: Modify etcd main configuration
  ansible.builtin.template:
    src: ../templates/etcd/conf/etcd.conf.yml.j2
    dest: /home/{{ etcd_system_user }}/conf/etcd.conf.yml
    mode: "0644"
  notify: restart etcd service
  when: ansible_os_family == 'Debian'

# Let handler do this since it will get triggered by conf file write anyway, otherwise daemon_reload wont have run yet
#- name: Enable etcd systemd service
#  service:
#    name: "{{ etcd_systemd_service_name }}"
#    state: started
#    enabled: true

- name: Allow etcd traffic through firewall
  community.general.ufw:
    port: "{{ etcd_tcp_port }}"
    proto: tcp
    rule: allow
  when: ansible_distribution == 'Ubuntu'

- name: Allow etcd cluster traffic through firewall
  community.general.ufw:
    port: "{{ etcd_cluster_tcp_port }}"
    proto: tcp
    rule: allow
  when: ansible_distribution == 'Ubuntu'
