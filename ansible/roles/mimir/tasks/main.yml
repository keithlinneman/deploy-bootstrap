- name: Set filename based on architecture
  ansible.builtin.set_fact:
    arch_normalized: >-
      {%- if ansible_architecture == "aarch64" -%} arm64{%- else -%} amd64{%- endif -%}

- name: Get pinned Mimir release from s3 artifacts bucket
  amazon.aws.s3_object:
    bucket: "{{ artifacts_bucket_name }}"
    object: "thirdparty/grafana/mimir/mimir-{{ mimir_version }}/mimir-linux-{{ arch_normalized }}"
    dest: /home/{{ mimir_system_user }}/bin/mimir
    mode: get
    overwrite: different

- name: Ensure mimir binary is executable
  ansible.builtin.file:
    path: /home/{{ mimir_system_user }}/bin/mimir
    owner: "{{ mimir_system_user }}"
    group: "{{ mimir_system_user }}"
    mode: "0750"

- name: Create mimir systemd service
  ansible.builtin.template:
    src: /etc/systemd/system/mimir.service.j2
    dest: /etc/systemd/system/{{ mimir_systemd_service_name[mimir_role] }}.service
    mode: "0644"

- name: Modify mimir main configuration
  ansible.builtin.template:
    src: /mimir/conf/mimir.yml.j2
    dest: /home/{{ mimir_system_user }}/conf/mimir.yml
    mode: "0640"
    owner: "{{ mimir_system_user }}"
    group: "{{ mimir_system_user }}"
  notify: Restart mimir service
  when: ansible_os_family == 'Debian'

- name: Allow mimir http traffic through firewall
  community.general.ufw:
    port: "{{ mimir_http_tcp_port }}"
    proto: tcp
    rule: allow
  # this is used both for service traffic in case of distributors and query-frontend, and for prometheus metrics scraping on all services
  # when: ansible_distribution == 'Ubuntu' and (mimir_role == 'distributor' or mimir_role == 'query-frontend')
  when: ansible_distribution == 'Ubuntu'

- name: Allow mimir grpc traffic through firewall
  community.general.ufw:
    port: "{{ mimir_grpc_tcp_port }}"
    proto: tcp
    rule: allow
  when: ansible_distribution == 'Ubuntu'

- name: Allow mimir cluster memberlist tcp traffic through firewall
  community.general.ufw:
    port: "{{ mimir_cluster_memberlist_port }}"
    proto: tcp
    rule: allow
  when: ansible_distribution == 'Ubuntu'

- name: Allow mimir cluster memberlist udp traffic through firewall
  community.general.ufw:
    port: "{{ mimir_cluster_memberlist_port }}"
    proto: udp
    rule: allow
  when: ansible_distribution == 'Ubuntu'
