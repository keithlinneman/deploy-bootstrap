---
- name: Include OS variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "../vars/{{ ansible_distribution }}.yml"
    - "../vars/{{ ansible_os_family }}.yml"

- name: Get instance metadata
  amazon.aws.ec2_metadata_facts:

- name: Set variables from ssm vars that require ec2 metadata
  ansible.builtin.set_fact:
    account_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/account/name', region=ansible_ec2_instance_identity_document_region) }}"
    artifacts_bucket_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/artifacts/bucket/name', region=ansible_ec2_instance_identity_document_region) }}"
    company_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/company/name', region=ansible_ec2_instance_identity_document_region) }}"
    hosted_zone_name: "{{ lookup('amazon.aws.aws_ssm', '/platform/dns/hosted_zone/name', region=ansible_ec2_instance_identity_document_region) }}"
    platform_env: "{{ lookup('amazon.aws.aws_ssm', '/platform/env/name', region=ansible_ec2_instance_identity_document_region) }}"
    mimir_s3_bucket_name: "{{ lookup('amazon.aws.aws_ssm', '/app/mimir/s3/bucket/name', region=ansible_ec2_instance_identity_document_region) }}"
    mimir_role: "{{ lookup('env', 'MIMIRROLE') }}"

- name: Print all environment vars for debugging
  ansible.builtin.debug:
    var: hostvars[inventory_hostname]
    verbosity: 2

- name: Exit with failure if no mimir role is defined
  ansible.builtin.fail:
    msg: No ansible roles found in ENV var MIMIRROLE (expected one of 'distributor', 'ingester', 'query-frontend', 'querier', 'query-scheduler',
      'store-gateway', 'compactor')
  when: mimir_role not in ['distributor', 'ingester', 'query-frontend', 'querier', 'query-scheduler', 'store-gateway', 'compactor']

- name: Ensure required variables are defined
  ansible.builtin.fail:
    msg: "{{ item }} must be defined use -e {{ item }}=value"
  when: (lookup('vars', item, default=None)) is none
  loop:
    - env
    - mimir_role

- name: Create mimir user
  ansible.builtin.user:
    name: "{{ mimir_system_user }}"
    password: "*"
    umask: "027"
    shell: /usr/sbin/nologin
    system: true

- name: Create mimir bin, conf, data directories
  ansible.builtin.file:
    path: /home/{{ mimir_system_user }}/{{ item }}
    owner: "{{ mimir_system_user }}"
    group: "{{ mimir_system_user }}"
    mode: "0750"
    state: directory
  loop:
    - bin
    - conf
    - conf/ssl
    - data

- name: Generate private key for local self signed ssl cert
  community.crypto.openssl_privatekey:
    path: /home/{{ mimir_system_user }}/conf/ssl/cert.key
    owner: "{{ mimir_system_user }}"

- name: Generate CSR for self-signed certificate for local https listener
  community.crypto.openssl_csr_pipe:
    privatekey_path: /home/{{ mimir_system_user }}/conf/ssl/cert.key
    common_name: "{{ ansible_nodename }}"
  register: csr

- name: Generate self-signed certificate for local https listener
  community.crypto.x509_certificate:
    path: /home/{{ mimir_system_user }}/conf/ssl/cert.pem
    csr_content: "{{ csr.csr }}"
    privatekey_path: /home/{{ mimir_system_user }}/conf/ssl/cert.key
    owner: "{{ mimir_system_user }}"
    provider: selfsigned

- name: Check if mimir is already installed
  ansible.builtin.stat:
    path: /home/{{ mimir_system_user }}/bin/mimir
  register: mimir_binary

